<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>菊建クラッシャー ～ピンクの水玉重機、参上！～</title>
<style>
  html,body{margin:0;padding:0;background:#2a2138;height:100%;overflow:hidden;overscroll-behavior:none;}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%;}
  canvas{background:#9ad6f0;image-rendering:auto;box-shadow:0 0 40px rgba(255,46,146,.4);border-radius:8px;touch-action:none;-webkit-user-select:none;user-select:none;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="960" height="540"></canvas></div>
<script>
"use strict";
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const W = 960, H = 540;
const GROUND = H - 70;
const L1 = 74, L2 = 64;          // ブーム・アーム長
const FONT = '"Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
// 鮮やかピンクのパレット
const PINK   = '#ff2e92';
const PINK_D = '#d4147a';
const PINK_L = '#ff8fc6';
// 重機の強化レベル（監督を説得した人数で成長）
const LV_SCALE = [1, 1.18, 1.4];     // 機体サイズ
const LV_MUL   = [1, 1.6, 2.4];      // 火力倍率
const LV_KILLS = [0, 4, 10];         // 必要説得人数
// 難易度（enemy:敵の数 dmg:被ダメージ倍率 ehp:敵の頑丈さ bhp:ビル/ボスの頑丈さ）
const DIFFS = [
  { name: 'やさしい', col: '#7ad36b', enemy: 1,   dmg: 1,   ehp: 1,    bhp: 1 },
  { name: 'ふつう',   col: '#ffd24d', enemy: 1.5, dmg: 1.5, ehp: 1.35, bhp: 1.2 },
  { name: '高難度',   col: '#ff5252', enemy: 2,   dmg: 2,   ehp: 1.7,  bhp: 1.45 },
  { name: '鬼むず',   col: '#b44dff', enemy: 4,   dmg: 4,   ehp: 3.4,  bhp: 2.9 },
];
let diff = 0;
const MODE_BTNS = [
  { x: W/2 - 332, y: 468, w: 156, h: 42 },
  { x: W/2 - 162, y: 468, w: 156, h: 42 },
  { x: W/2 + 8,   y: 468, w: 156, h: 42 },
  { x: W/2 + 178, y: 468, w: 156, h: 42 },
];
function titleModeAt(x, y){
  for(let i = 0; i < MODE_BTNS.length; i++){
    const b = MODE_BTNS[i];
    if(x >= b.x - 6 && x <= b.x + b.w + 6 && y >= b.y - 6 && y <= b.y + b.h + 6) return i;
  }
  return -1;
}

function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H) * 0.97;
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fit); fit();

// ---------- サウンド ----------
let AC = null;
function ac(){ if(!AC){ AC = new (window.AudioContext || window.webkitAudioContext)(); } return AC; }
function env(g, t, a, d){ g.gain.setValueAtTime(a, t); g.gain.exponentialRampToValueAtTime(0.001, t + d); }
function sfxBoom(big){
  try{
    const a = ac(), t = a.currentTime, dur = big ? 0.7 : 0.3;
    const n = a.createBufferSource();
    const buf = a.createBuffer(1, a.sampleRate * dur, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
    n.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(big ? 1000 : 600, t);
    f.frequency.exponentialRampToValueAtTime(70, t + dur);
    const g = a.createGain(); env(g, t, big ? 0.55 : 0.25, dur);
    n.connect(f).connect(g).connect(a.destination);
    n.start(t);
  }catch(e){}
}
function sfxClank(){
  try{
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(900, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.1);
    env(g, t, 0.15, 0.12); o.connect(g).connect(a.destination);
    o.start(t); o.stop(t + 0.13);
  }catch(e){}
}
function sfxCrush(){
  try{
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.18);
    env(g, t, 0.3, 0.2); o.connect(g).connect(a.destination);
    o.start(t); o.stop(t + 0.22);
    sfxClank();
  }catch(e){}
}
function sfxHurt(){
  try{
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(70, t + 0.2);
    env(g, t, 0.2, 0.22); o.connect(g).connect(a.destination);
    o.start(t); o.stop(t + 0.25);
  }catch(e){}
}
function sfxSoothe(){
  try{
    const a = ac(), t = a.currentTime;
    [660, 880, 1100].forEach((f, i) => {
      const o = a.createOscillator(), g = a.createGain();
      o.type = 'sine'; o.frequency.value = f;
      env(g, t + i*0.07, 0.14, 0.25);
      o.connect(g).connect(a.destination);
      o.start(t + i*0.07); o.stop(t + i*0.07 + 0.27);
    });
  }catch(e){}
}
function sfxClear(){
  try{
    const a = ac(), t = a.currentTime;
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      env(g, t + i*0.12, 0.18, 0.3);
      o.connect(g).connect(a.destination);
      o.start(t + i*0.12); o.stop(t + i*0.12 + 0.32);
    });
  }catch(e){}
}
function sfxSpecial(){
  try{
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(1400, t + 0.8);
    env(g, t, 0.25, 0.85);
    o.connect(g).connect(a.destination);
    o.start(t); o.stop(t + 0.9);
    setTimeout(() => sfxBoom(true), 800);
    [784, 988, 1175, 1568].forEach((f, i) => {
      const o2 = a.createOscillator(), g2 = a.createGain();
      o2.type = 'triangle'; o2.frequency.value = f;
      env(g2, t + 0.9 + i*0.08, 0.2, 0.5);
      o2.connect(g2).connect(a.destination);
      o2.start(t + 0.9 + i*0.08); o2.stop(t + 0.9 + i*0.08 + 0.52);
    });
  }catch(e){}
}
function sfxWhistle(){
  // オペレーター登場の指笛風
  try{
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1800, t);
    o.frequency.exponentialRampToValueAtTime(2600, t + 0.12);
    o.frequency.exponentialRampToValueAtTime(1500, t + 0.3);
    env(g, t, 0.15, 0.32);
    o.connect(g).connect(a.destination);
    o.start(t); o.stop(t + 0.35);
  }catch(e){}
}
let beamOscNode = null;
function beamSoundOn(){
  try{
    if(beamOscNode) return;
    const a = ac(), t = a.currentTime;
    const o = a.createOscillator(), g = a.createGain(), lfo = a.createOscillator(), lg = a.createGain();
    o.type = 'sawtooth'; o.frequency.value = 180;
    lfo.type = 'sine'; lfo.frequency.value = 14; lg.gain.value = 40;
    lfo.connect(lg).connect(o.frequency);
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.06, t + 0.08);
    o.connect(g).connect(a.destination);
    o.start(t); lfo.start(t);
    beamOscNode = { o, g, lfo };
  }catch(e){}
}
function beamSoundOff(){
  try{
    if(!beamOscNode) return;
    const a = ac(), t = a.currentTime;
    beamOscNode.g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    beamOscNode.o.stop(t + 0.12); beamOscNode.lfo.stop(t + 0.12);
    beamOscNode = null;
  }catch(e){}
}

// ---------- 入力 ----------
const keys = {};
let mouseX = W/2, mouseY = H/2, beamHeld = false;
addEventListener('keydown', e => {
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(e.code === 'Space' && !keys['Space'] && state === 'play') trySpecial();
  if(e.code === 'KeyE' && !keys['KeyE'] && state === 'play') tryHammer();
  keys[e.code] = true;
  if(e.code === 'KeyR' && (state === 'gameover' || state === 'ending')) toTitle();
  if(state === 'title' && ['Digit1', 'Digit2', 'Digit3', 'Digit4'].includes(e.code)){
    diff = +e.code.slice(-1) - 1;
    newGame();
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * W / r.width;
  mouseY = (e.clientY - r.top) * H / r.height;
});
cv.addEventListener('mousedown', e => {
  ac().resume && ac().resume();
  if(state === 'title'){
    const r = cv.getBoundingClientRect();
    const mx2 = (e.clientX - r.left) * W / r.width, my2 = (e.clientY - r.top) * H / r.height;
    const m = titleModeAt(mx2, my2);
    if(m >= 0){ diff = m; newGame(); }
    return;
  }
  if(state === 'gameover' || state === 'ending'){ toTitle(); return; }
  if(e.button === 0) beamHeld = true;
  if(e.button === 2) tryCrush();
});
addEventListener('mouseup', e => { if(e.button === 0) beamHeld = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());

// ---------- タッチ操作（スマホ対応） ----------
let touchMode = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const TBTNS = {
  left:   { x: 70,      y: H - 60,  r: 42, label: '◀' },
  right:  { x: 175,     y: H - 60,  r: 42, label: '▶' },
  jump:   { x: 122,     y: H - 152, r: 34, label: '▲' },
  crush:  { x: W - 70,  y: H - 60,  r: 42, label: '✂' },
  sp:     { x: W - 175, y: H - 60,  r: 38, label: '💗' },
  hammer: { x: W - 122, y: H - 152, r: 34, label: '⚒' },
};
const touchCtl = {};   // touch.identifier → 'left'|'right'|'jump'|'aim'
function touchPos(t){
  const r = cv.getBoundingClientRect();
  return { x: (t.clientX - r.left) * W / r.width, y: (t.clientY - r.top) * H / r.height };
}
function hitButton(x, y){
  for(const k in TBTNS){
    const b = TBTNS[k];
    if(Math.hypot(x - b.x, y - b.y) <= b.r + 8) return k;
  }
  return null;
}
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  touchMode = true;
  try{ ac().resume && ac().resume(); }catch(err){}
  if(state === 'title'){
    const pos = touchPos(e.changedTouches[0]);
    const m = titleModeAt(pos.x, pos.y);
    if(m >= 0){ diff = m; newGame(); }
    return;
  }
  if(state === 'gameover' || state === 'ending'){ toTitle(); return; }
  for(const t of e.changedTouches){
    const pos = touchPos(t);
    const btn = hitButton(pos.x, pos.y);
    if(btn === 'left'){ touchCtl[t.identifier] = 'left'; keys['KeyA'] = true; }
    else if(btn === 'right'){ touchCtl[t.identifier] = 'right'; keys['KeyD'] = true; }
    else if(btn === 'jump'){ touchCtl[t.identifier] = 'jump'; keys['KeyW'] = true; }
    else if(btn === 'crush'){ touchCtl[t.identifier] = 'btn'; tryCrush(); }
    else if(btn === 'sp'){ touchCtl[t.identifier] = 'btn'; trySpecial(); }
    else if(btn === 'hammer'){ touchCtl[t.identifier] = 'btn'; tryHammer(); }
    else {
      touchCtl[t.identifier] = 'aim';
      mouseX = pos.x; mouseY = pos.y;
      beamHeld = true;
    }
  }
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(touchCtl[t.identifier] === 'aim'){
      const pos = touchPos(t);
      mouseX = pos.x; mouseY = pos.y;
    }
  }
}, { passive: false });
function touchEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const c = touchCtl[t.identifier];
    delete touchCtl[t.identifier];
    if(c === 'left') keys['KeyA'] = false;
    else if(c === 'right') keys['KeyD'] = false;
    else if(c === 'jump') keys['KeyW'] = false;
    else if(c === 'aim'){
      // 他にaim中の指がなければビーム停止
      if(!Object.values(touchCtl).includes('aim')) beamHeld = false;
    }
  }
}
cv.addEventListener('touchend', touchEnd, { passive: false });
cv.addEventListener('touchcancel', touchEnd, { passive: false });

// ---------- ゲーム状態 ----------
let state = 'title';
let stage = 1, score = 0;
let hiscore = +(localStorage.getItem('kikukenHiscore') || 0);
let player, buildings, sups, angerShots, parts, texts, bubbles;
let camX = 0, shake = 0, stateTimer = 0;
let supTimer = 0, worldEnd = 2000;
let tGlobal = 0;
let beamRay = null;     // 今フレームのビーム描画情報
let spFx = null;        // 必殺技エフェクト
let opFx = null;        // オペレーター（最終手段）
let gWave = null;       // 大ハンマーの地震波
let flashT = 0;
let zoomCur = 1;
// --- 新要素 ---
let weather = 'sun';    // sun / rain / snow / storm
let birds = [], poops = [], pickups = [];
let sprayer = null;     // 助っ人散水職人
let birdTimer = 0, sprayTimer = 0;
let stageIntroT = 0, lightningT = 0, spookyT = 0;
let rankSaved = false;
let boss = null;        // 建機ボス
let allies = [];        // 応援のピンク重機
const MAX_STAGE = 10;
const LANDMARKS = [
  { name: '東京タワー（風）',   w: 170, h: 300 },
  { name: 'スカイツリー（風）', w: 150, h: 340 },
  { name: '六本木ヒルズ（風）', w: 210, h: 280 },
  { name: '日本武道館（風）',   w: 240, h: 185 },
  { name: '東京都庁（風）',     w: 230, h: 300 },
  { name: '国立競技場（風）',   w: 310, h: 150 },
  { name: '雷門（風）',         w: 230, h: 175 },
  { name: '通天閣（風）',       w: 150, h: 290 },
  { name: '大阪城（風）',       w: 250, h: 250 },
  { name: '国会議事堂（風）',   w: 330, h: 230 },
];
const WICON = { sun: '☀', rain: '☔', snow: '⛄', storm: '🌀' };

function toTitle(){ state = 'title'; beamHeld = false; beamSoundOff(); spFx = null; opFx = null; gWave = null; flashT = 0; zoomCur = 1; }

function newGame(){
  stage = 1; score = 0;
  player = {
    x: 150, y: GROUND, vx: 0, vy: 0, onGround: true,
    hp: 100, maxHp: 100,
    facing: 1, turn: 1,
    tx: 400, ty: 300,
    pitch: 0, tread: 0,
    beamTime: 0,                  // 必殺発動後のビーム解放残り時間
    sp: 0, ramCd: 0,
    guts: 100,                    // 漢気ゲージ（最終手段・初回は満タン）
    lv: 1, kills: 0, scl: 1,      // 強化レベル（監督を説得で成長）
    armMul: 1,                    // アーム長倍率（ステージ8〜ロングアーム）
    jaw: 0.18, crushT: 0, crushCd: 0,
    inv: 0, smokeT: 0, heartT: 0
  };
  spFx = null; opFx = null;
  rankSaved = false;
  startStage(1);
  state = 'play';
}

function startStage(n){
  stage = n;
  buildings = []; sups = []; angerShots = []; parts = []; texts = []; bubbles = [];
  birds = []; poops = []; pickups = []; sprayer = null;
  spFx = null; opFx = null; gWave = null; flashT = 0;
  boss = null; allies = [];
  // 天候（ステージ1は晴れ、最終ステージは台風）
  weather = n === 1 ? 'sun' : n === MAX_STAGE ? 'storm'
          : pick(n >= 5 ? ['sun', 'rain', 'snow', 'storm'] : ['sun', 'rain', 'snow']);
  let x = 520;
  const count = 3 + Math.ceil(n * 0.9);
  for(let i = 0; i < count; i++){
    const w = 130 + Math.random() * 90;
    const h = 110 + Math.random() * (120 + n * 16);
    const hp = Math.round(((w * h) / 1500 + n * 2) * DIFFS[diff].bhp);
    buildings.push({ x, w, h, hp, maxHp: hp, seed: Math.random() * 1000 | 0, destroyed: false, shakeT: 0 });
    x += w + 170 + Math.random() * 110;
  }
  // ステージボス：日本の名所（デフォルメ）
  const lm = LANDMARKS[Math.min(n, MAX_STAGE) - 1];
  x += 140;
  const lhp = Math.round((45 + n * 20) * DIFFS[diff].bhp);
  buildings.push({ x, w: lm.w, h: lm.h, hp: lhp, maxHp: lhp, seed: 7,
                   destroyed: false, shakeT: 0, landmark: true, kind: Math.min(n, MAX_STAGE), name: lm.name });
  // 建機ボス（偶数ステージで名所の手前に出現）
  const bdef = bossForStage(n);
  if(bdef){
    const bhp2 = Math.round(bdef.hp * DIFFS[diff].bhp);
    boss = Object.assign({}, bdef, {
      hp: bhp2, maxHp: bhp2,
      x: x - 330, y: GROUND, face: -1, t: 0, state: 'charge', stateT: 0,
      vx: 0, flinch: 0, intro: false, ballA: 0, dumpA: 0, swingT: 0
    });
  }
  x += lm.w;
  worldEnd = x + 380;
  player.x = 150; player.y = GROUND; player.vx = 0; player.vy = 0;
  camX = 0;
  supTimer = 2.5;
  birdTimer = rnd(3, 6);
  sprayTimer = rnd(14, 24);
  stageIntroT = 3.4;
  player.hp = Math.min(player.maxHp, player.hp + 25);
  // ステージ8以降はロングアーム仕様に乗り換え
  const wasLong = player.armMul > 1;
  player.armMul = n >= 8 ? 1.55 : 1;
  if(n >= 8 && !wasLong){
    addText(player.x, GROUND - 170, '✨ ロングアーム重機に乗り換えた！', '#ffe14d', true);
    addText(player.x, GROUND - 140, '高いところまでアームが届くぞ！', '#fff');
    heartsBurst(player.x, GROUND - 80, 14, 120);
  }
}

// ---------- ユーティリティ ----------
function rnd(a, b){ return a + Math.random() * (b - a); }
function clamp(v, a, b){ return v < a ? a : v > b ? b : v; }
function lerp(a, b, t){ return a + (b - a) * t; }
function circleRect(cxp, cyp, r, rx, ry, rw, rh){
  const nx = clamp(cxp, rx, rx + rw), ny = clamp(cyp, ry, ry + rh);
  const dx = cxp - nx, dy = cyp - ny;
  return dx*dx + dy*dy <= r*r;
}
function addText(x, y, str, col, big){
  texts.push({ x, y, str, col: col || '#fff', life: 1.1, big: !!big });
}
function addBubble(x, y, str){
  bubbles.push({ x, y, str, life: 1.6 });
}
function addScore(n, x, y){
  score += n;
  addText(x, y, '+' + n, '#ffe14d');
  if(score > hiscore){ hiscore = score; localStorage.setItem('kikukenHiscore', hiscore); }
}
function addSp(n){ player.sp = clamp(player.sp + n, 0, 100); }
function dust(x, y, n, col, spd){
  for(let i = 0; i < n; i++){
    parts.push({ type: 'dust', x: x + rnd(-10,10), y: y + rnd(-10,10),
      vx: rnd(-1,1) * (spd||60), vy: rnd(-1.4,0.2) * (spd||60),
      size: rnd(8,22), life: rnd(0.5,1.1), maxLife: 1.1, col: col || '#b9aa98' });
  }
}
function rubble(x, y, n){
  for(let i = 0; i < n; i++){
    parts.push({ type: 'rock', x, y: y + rnd(-20,0),
      vx: rnd(-180,180), vy: rnd(-340,-60),
      size: rnd(4,11), rot: rnd(0,6.28), vr: rnd(-6,6),
      life: rnd(0.8,1.6), maxLife: 1.6,
      col: ['#8e8478','#a09686','#776e63'][Math.random()*3|0] });
  }
}
function sparks(x, y, n, col){
  for(let i = 0; i < n; i++){
    parts.push({ type: 'spark', x, y, vx: rnd(-250,250), vy: rnd(-250,150),
      size: rnd(2,4), life: rnd(0.2,0.5), maxLife: 0.5, col: col || PINK_L });
  }
}
function stars(x, y, n){
  for(let i = 0; i < n; i++){
    parts.push({ type: 'star', x: x + rnd(-10,10), y: y + rnd(-10,10),
      vx: rnd(-90,90), vy: rnd(-90,90),
      size: rnd(4,9), rot: rnd(0,6.28), vr: rnd(-8,8),
      life: rnd(0.4,0.8), maxLife: 0.8, col: '#ffe14d' });
  }
}
function heartsBurst(x, y, n, spd){
  for(let i = 0; i < n; i++){
    parts.push({ type: 'heart', x: x + rnd(-8,8), y: y + rnd(-8,8),
      vx: rnd(-1,1) * (spd||80), vy: rnd(-1.2,-0.2) * (spd||80),
      size: rnd(6,15), life: rnd(0.6,1.3), maxLife: 1.3,
      col: [PINK, PINK_L, '#ff5db0'][Math.random()*3|0] });
  }
}
function heartFall(x, y){
  parts.push({ type: 'heartfall', x, y, vx: 0, vy: rnd(170,330),
    size: rnd(8,18), life: rnd(1.4,2.2), maxLife: 2.2,
    col: [PINK, PINK_L, '#ffd0e4'][Math.random()*3|0], ph: rnd(0,6.28) });
}
function heartDrift(x, y){
  // ふわっと漂う小さなハート
  parts.push({ type: 'heart', x, y, vx: rnd(-14,14), vy: rnd(-45,-25),
    size: rnd(4,8), life: rnd(1.0,1.8), maxLife: 1.8,
    col: [PINK_L, '#ffd0e4', PINK][Math.random()*3|0] });
}
function smoke(x, y, big){
  parts.push({ type: 'smoke', x, y, vx: rnd(-8,8), vy: rnd(-50,-30),
    size: big ? rnd(8,12) : rnd(4,7), life: rnd(0.7,1.2), maxLife: 1.2, col: '#777' });
}

// ---------- アームIK（2関節） ----------
function ik(p){
  const S = p.scl || 1;
  const am = p.armMul || 1;          // ステージ8以降はロングアーム
  const l1 = L1 * S * am, l2 = L2 * S * am;
  const sx = p.x + p.turn * 16 * S, sy = p.y - 64 * S;
  let dx = p.tx - sx, dy = p.ty - sy;
  let d = Math.hypot(dx, dy) || 1;
  d = clamp(d, 40 * S, l1 + l2 - 6);
  const base = Math.atan2(dy, dx);
  const cosO = clamp((l1*l1 + d*d - l2*l2) / (2 * l1 * d), -1, 1);
  const off = Math.acos(cosO);
  const f = p.facing >= 0 ? 1 : -1;
  const a1 = base - off * f;
  const ex = sx + Math.cos(a1) * l1, ey = sy + Math.sin(a1) * l1;
  const tx = sx + Math.cos(base) * d, ty = sy + Math.sin(base) * d;
  const a2 = Math.atan2(ty - ey, tx - ex);
  return { sx, sy, ex, ey, tx, ty, a1, a2 };
}

// ---------- アクション ----------
function tryCrush(){
  // 油圧圧砕機で噛む（通常攻撃）
  const p = player;
  if(state !== 'play' || p.crushCd > 0 || opFx) return;
  const S = p.scl || 1, MUL = LV_MUL[p.lv - 1] || 1;
  p.crushCd = 0.42; p.crushT = 0.26;
  const t = ik(p);
  const jx = t.tx + Math.cos(t.a2) * 46 * S, jy = t.ty + Math.sin(t.a2) * 46 * S;
  sfxCrush();
  shake = Math.max(shake, 5 + (S - 1) * 8);
  dust(jx, jy, 6, '#cbbfae', 70);
  let hitAny = false;
  for(const b of buildings){
    if(b.destroyed) continue;
    if(circleRect(jx, jy, 58 * S, b.x, GROUND - b.h, b.w, b.h)){
      damageBuilding(b, 9 * MUL, jx, jy); hitAny = true;
    }
  }
  for(const s of sups){
    if(s.state === 'soothed' || s.state === 'smacked') continue;
    if(Math.hypot(s.x - jx, (s.y - 34 * s.scale) - jy) < 64 * S){
      s.hp -= 8 * MUL; s.flinch = 0.25; hitAny = true;
      sparks(s.x, s.y - 40, 6, '#ffd24d');
    }
  }
  for(const bd of birds){
    if(Math.hypot(bd.x - jx, bd.y - jy) < 60 * S){ bd.hp = 0; hitAny = true; }
  }
  if(boss && boss.intro && circleRect(jx, jy, 58 * S, boss.x - boss.bw / 2, GROUND - boss.bh, boss.bw, boss.bh)){
    damageBoss(8 * MUL, jx, jy); hitAny = true;
  }
  if(hitAny){ addSp(5); rubble(jx, jy, 5); heartsBurst(jx, jy, 3, 70); }
}

function trySpecial(){
  const p = player;
  if(p.sp < 100 || spFx || opFx) return;
  p.sp = 0;
  spFx = { t: 0, x: p.x, y: p.y - 50, r: 0 };
  p.beamTime = 8.5;            // 必殺発動中＋発動後はハートビーム解放！
  for(const b of buildings) b._sp = false;
  for(const s of sups) s._sp = false;
  if(boss) boss._sp = false;
  sfxSpecial();
  shake = 18;
}

function tryHammer(){
  const p = player;
  if(p.guts < 100 || opFx || spFx) return;
  p.guts = 0;
  beamHeld = false; beamSoundOff();
  opFx = {
    phase: 'out', t: 0, total: 0,
    x: p.x + p.turn * 10, y: p.y - 86,
    vx: p.turn * 90, vy: -260,
    face: p.turn >= 0 ? 1 : -1,
    targetX: p.x + 200 * (p.turn >= 0 ? 1 : -1),
    hit: false
  };
  sfxWhistle();
  addBubble(p.x, p.y - 150, '楽勝です！楽勝です！');
}

function nearestSmackable(){
  let best = null, bd = 1e9;
  for(const s of sups){
    if(s.state === 'soothed' || s.state === 'smacked') continue;
    const d = Math.abs(s.x - (opFx ? opFx.x : player.x));
    if(d < bd){ bd = d; best = s; }
  }
  if(best) return best;
  // 監督がいなければ一番近いビルへ
  let bb = null; bd = 1e9;
  for(const b of buildings){
    if(b.destroyed) continue;
    const c = b.x + b.w / 2;
    const d = Math.abs(c - (opFx ? opFx.x : player.x));
    if(d < bd){ bd = d; bb = { x: c }; }
  }
  return bb;
}

// ---------- 時間スケール（スローモーション） ----------
function curTimeScale(){
  if(spFx){
    if(spFx.t < 0.95) return 0.15;   // どっぷりスロー
    if(spFx.t < 1.35) return 0.5;
  }
  if(opFx){
    if(opFx.phase === 'out')    return 0.07;   // 降臨シーンは超スローモーション
    if(opFx.phase === 'windup') return 0.25;
    if(opFx.phase === 'swing')  return 0.18;
  }
  return 1;
}

// ---------- 更新 ----------
let last = performance.now();
function loop(now){
  let raw = Math.min(0.033, (now - last) / 1000);
  last = now; tGlobal += raw;
  const dt = raw * curTimeScale();
  if(state === 'play' || state === 'clear') update(dt, raw);
  draw();
  requestAnimationFrame(loop);
}

function update(dt, raw){
  shake = Math.max(0, shake - raw * 30);
  const p = player;
  const S = p.scl || 1, MUL = LV_MUL[p.lv - 1] || 1;

  // --- 走行（履帯：慣性付き） ---
  let mv = 0;
  if(!opFx){
    if(keys['ArrowLeft'] || keys['KeyA']) mv -= 1;
    if(keys['ArrowRight'] || keys['KeyD']) mv += 1;
  }
  const targetV = mv * (215 + (S - 1) * 130);
  p.vx = lerp(p.vx, targetV, Math.min(1, dt * 2.4));
  if(Math.abs(p.vx) < 4 && mv === 0) p.vx = 0;
  p.pitch = lerp(p.pitch, clamp((targetV - p.vx) * 0.00045 + p.vx * 0.00012, -0.07, 0.07), Math.min(1, dt * 5));
  if(!opFx && (keys['ArrowUp'] || keys['KeyW']) && p.onGround){
    p.vy = -560; p.onGround = false;
    dust(p.x, p.y, 8, '#b9aa98', 90);
    sfxClank();
  }
  p.vy += 1150 * dt;
  const prevY = p.y;
  p.x += p.vx * dt; p.y += p.vy * dt;
  p.x = clamp(p.x, 60, worldEnd - 60);
  // 着地判定（地面＋ビルの屋上はワンウェイ足場：低めのビルに乗れる！）
  let gy = GROUND;
  for(const b of buildings){
    if(b.destroyed) continue;
    const top = GROUND - b.h;
    if(p.x > b.x + 10 && p.x < b.x + b.w - 10 && prevY <= top + 4 && p.vy >= 0){
      gy = Math.min(gy, top);
    }
  }
  if(p.y >= gy && p.vy >= 0){
    if(!p.onGround && p.vy > 350){ dust(p.x, gy, 8); shake = Math.max(shake, 4); sfxClank(); }
    p.y = gy; p.vy = 0; p.onGround = true;
  }else if(p.y < gy - 0.5){
    p.onGround = false;
  }
  if(p.inv > 0) p.inv -= dt;
  p.tread += p.vx * dt;
  if(Math.abs(p.vx) > 60 && p.onGround && Math.random() < dt * 14)
    dust(p.x - Math.sign(p.vx) * 46, p.y, 1, '#c4b6a0', 40);
  p.smokeT -= dt;
  if(p.smokeT <= 0){
    p.smokeT = Math.abs(p.vx) > 50 ? 0.12 : 0.4;
    smoke(p.x - p.turn * 34, p.y - 70, Math.abs(p.vx) > 50);
  }
  // 重機から常時ハートがふわふわ
  p.heartT -= dt;
  if(p.heartT <= 0){
    p.heartT = rnd(0.35, 0.7);
    heartDrift(p.x + rnd(-40, 40), p.y - rnd(40, 80));
  }
  // 漢気ゲージ（時間でじわじわ回復）
  if(state === 'play' && !opFx) p.guts = clamp(p.guts + 2.6 * dt, 0, 100);
  // 台風の強風（空中で流される）
  if(weather === 'storm' && !p.onGround) p.vx += Math.sin(tGlobal * 0.6) * 220 * dt;

  // --- 体当たり（スピードに乗ってビルに突っ込む） ---
  if(p.ramCd > 0) p.ramCd -= dt;
  if(Math.abs(p.vx) > 140 && p.ramCd <= 0 && state === 'play'){
    for(const b of buildings){
      if(b.destroyed) continue;
      if(p.y <= GROUND - b.h + 12) continue;   // 屋上に乗っている時は壊さない
      if(p.x + 50 * S > b.x && p.x - 50 * S < b.x + b.w){
        p.ramCd = 0.28;
        const hx2 = clamp(p.x + Math.sign(p.vx) * 50 * S, b.x, b.x + b.w);
        damageBuilding(b, 6 * MUL, hx2, GROUND - rnd(20, 60));
        shake = Math.max(shake, 5);
        p.vx *= 0.8;
        addSp(3);
        break;
      }
    }
    // ボスにも体当たり
    if(boss && boss.intro && p.ramCd <= 0 &&
       Math.abs(p.x - boss.x) < boss.bw / 2 + 45 * S && p.y > GROUND - boss.bh + 12){
      p.ramCd = 0.3;
      damageBoss(6 * MUL, p.x + Math.sign(p.vx) * 40, GROUND - 60);
      p.vx *= -0.5;
      shake = Math.max(shake, 6);
      addSp(3);
    }
  }

  // --- 旋回体の向き ---
  const mwx = mouseX + camX, mwy = mouseY;
  if(!opFx) p.facing = (mwx >= p.x) ? 1 : -1;
  p.turn = lerp(p.turn, p.facing, Math.min(1, dt * 5));
  p.tx = mwx; p.ty = Math.min(mwy, GROUND + 8);

  camX = clamp(p.x - W * 0.4, 0, Math.max(0, worldEnd - W));

  const t = ik(p);
  const muzX = t.tx + Math.cos(t.a2) * 50 * S, muzY = t.ty + Math.sin(t.a2) * 50 * S;

  // --- 通常攻撃：押しっぱなしで圧砕機ガブガブ ---
  if(beamHeld && state === 'play' && !opFx && p.beamTime <= 0) tryCrush();

  // --- ハートビーム（必殺発動中のみ解放） ---
  beamRay = null;
  if(p.beamTime > 0) p.beamTime -= raw;
  const firing = beamHeld && state === 'play' && p.beamTime > 0 && !opFx && !(spFx && spFx.t < 0.9);
  if(firing){
    beamSoundOn();
    const ca = Math.cos(t.a2), sa = Math.sin(t.a2);
    let endX = muzX, endY = muzY, hitB = null, hitS = null, hitBoss = null;
    const MAXLEN = 540 * S * (p.armMul || 1);
    outer:
    for(let s = 0; s <= MAXLEN; s += 7){
      endX = muzX + ca * s; endY = muzY + sa * s;
      if(endY > GROUND + 2) break;
      if(boss && boss.intro && Math.abs(endX - boss.x) < boss.bw / 2 && endY > GROUND - boss.bh){ hitBoss = boss; break outer; }
      for(const b of buildings){
        if(b.destroyed) continue;
        if(endX > b.x && endX < b.x + b.w && endY > GROUND - b.h){ hitB = b; break outer; }
      }
      for(const su of sups){
        if(su.state === 'soothed' || su.state === 'smacked') continue;
        if(Math.abs(endX - su.x) < 18 * su.scale && endY > su.y - 64 * su.scale && endY < su.y){ hitS = su; break outer; }
      }
    }
    beamRay = { x1: muzX, y1: muzY, x2: endX, y2: endY };
    if(hitBoss){
      damageBoss(40 * MUL * dt, endX, endY, true);
      if(Math.random() < dt * 45) heartsBurst(endX, endY, 2, 80);
      if(Math.random() < dt * 14) sparks(endX, endY, 3, '#ffd24d');
    }else if(hitB){
      damageBuilding(hitB, 32 * MUL * dt, endX, endY, true);
      if(Math.random() < dt * 45) heartsBurst(endX, endY, 2, 80);
      if(Math.random() < dt * 10) rubble(endX, endY, 1);
    }else if(hitS){
      hitS.hp -= 45 * MUL * dt; hitS.flinch = 0.1;
      if(Math.random() < dt * 50) heartsBurst(endX, endY - 20, 2, 70);
    }else if(endY > GROUND){
      if(Math.random() < dt * 12) dust(endX, GROUND, 1, '#cbbfae', 30);
    }
    // ビームは鳥も癒す
    for(const bd of birds){
      const ddx = bd.x - muzX, ddy = bd.y - muzY;
      const proj = ddx * Math.cos(t.a2) + ddy * Math.sin(t.a2);
      if(proj > 0 && proj < 560 * S &&
         Math.abs(-ddx * Math.sin(t.a2) + ddy * Math.cos(t.a2)) < 22) bd.hp = 0;
    }
  }else{
    beamSoundOff();
  }

  // --- ニブラ開閉 ---
  let jawTarget = 0.16 + Math.sin(tGlobal * 2.2) * 0.04;
  if(firing) jawTarget = 0.42;
  if(p.crushT > 0){ jawTarget = p.crushT > 0.15 ? 0.55 : 0.02; p.crushT -= dt; }
  if(p.crushCd > 0) p.crushCd -= dt;
  p.jaw = lerp(p.jaw, jawTarget, Math.min(1, dt * 14));

  // --- 必殺技 ---
  if(spFx){
    spFx.t += raw;
    const r = easeOut(clamp(spFx.t / 1.3, 0, 1)) * 780;
    spFx.r = r;
    spFx.x = p.x; spFx.y = p.y - 50;
    for(const b of buildings){
      if(b.destroyed || b._sp) continue;
      const bcx = b.x + b.w/2;
      if(Math.abs(bcx - spFx.x) < r){
        b._sp = true;
        damageBuilding(b, 12 + stage, bcx, GROUND - b.h / 2);
      }
    }
    for(const s of sups){
      if(s.state === 'soothed' || s.state === 'smacked' || s._sp) continue;
      if(Math.abs(s.x - spFx.x) < r){ s._sp = true; s.hp = 0; }
    }
    if(boss && boss.intro && !boss._sp && Math.abs(boss.x - spFx.x) < r){
      boss._sp = true;
      damageBoss(30 + stage * 2, boss.x, GROUND - 60);
    }
    for(let i = angerShots.length - 1; i >= 0; i--){
      if(Math.abs(angerShots[i].x - spFx.x) < r){
        heartsBurst(angerShots[i].x, angerShots[i].y, 4, 70);
        angerShots.splice(i, 1);
      }
    }
    if(spFx.t < 1.4){
      for(let k = 0; k < 4; k++) heartFall(camX + rnd(0, W), -20 - rnd(0, 60));
    }
    if(spFx.t > 2.1) spFx = null;
  }

  // --- オペレーター（最終手段） ---
  if(opFx) updateOp(raw);

  // --- 大ハンマーの地震波 ---
  if(flashT > 0) flashT = Math.max(0, flashT - raw);
  if(gWave){
    gWave.t += raw;
    gWave.r += 1500 * raw;
    for(const b of buildings){
      if(b.destroyed || b._gw) continue;
      const c = b.x + b.w / 2;
      if(Math.abs(c - gWave.x) <= gWave.r){
        b._gw = true;
        damageBuilding(b, 70 + stage * 5, c, GROUND - 40);
      }
    }
    for(const s of sups){
      if(s.state === 'soothed' || s.state === 'smacked') continue;
      if(Math.abs(s.x - gWave.x) <= gWave.r) smackSup(s, Math.sign(s.x - gWave.x) || 1);
    }
    if(boss && !boss._gw && Math.abs(boss.x - gWave.x) <= gWave.r){
      boss._gw = true;
      damageBoss(45, boss.x, GROUND - 60);
    }
    dust(gWave.x + gWave.r, GROUND, 2, '#c4b6a0', 90);
    dust(gWave.x - gWave.r, GROUND, 2, '#c4b6a0', 90);
    if(Math.random() < raw * 30) rubble(gWave.x + (Math.random() < 0.5 ? 1 : -1) * gWave.r, GROUND - 5, 2);
    if(gWave.r > 1300) gWave = null;
  }

  // --- 監督（元請けの怒り） ---
  if(state === 'play'){
    supTimer -= dt;
    const maxSups = Math.min(diff >= 3 ? 12 : 8, Math.round((1 + Math.ceil(stage * 0.6)) * DIFFS[diff].enemy));
    if(supTimer <= 0 && sups.filter(s => s.state === 'walk' || s.state === 'throw' || s.state === 'yell').length < maxSups){
      supTimer = rnd(3.2, 6) / ((1 + stage * 0.12) * (0.6 + 0.4 * DIFFS[diff].enemy));
      spawnSup();
    }
  }
  for(let i = sups.length - 1; i >= 0; i--){
    const s = sups[i];
    s.t += dt;
    if(s.flinch > 0) s.flinch -= dt;

    if(s.state === 'smacked'){
      // ハンマーで場外へ
      s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 500 * dt;
      s.spin = (s.spin || 0) + 14 * dt;
      if(Math.random() < dt * 30) stars(s.x, s.y - 40, 1);
      if(s.y < -150 || s.x < camX - 250 || s.x > camX + W + 250) sups.splice(i, 1);
      continue;
    }
    if(s.state === 'soothed'){
      s.sootheT += dt;
      s.y -= 40 * dt;
      if(Math.random() < dt * 8) heartsBurst(s.x, s.y - 40, 1, 30);
      if(s.sootheT > 1.3) sups.splice(i, 1);
      continue;
    }
    if(s.hp <= 0){
      s.state = 'soothed'; s.sootheT = 0;
      sfxSoothe();
      heartsBurst(s.x, s.y - 40, 16, 100);
      addScore(s.type === 1 ? 300 : 200, s.x, s.y - 70);
      addText(s.x, s.y - 95, '機嫌が直った！', PINK);
      addBubble(s.x, s.y - 110, pick(['まあええわ…', 'よろしく頼むで', '今日は帰るわ', 'ニコニコ']));
      addSp(16);
      addKill();
      continue;
    }

    const dx = p.x - s.x, adx = Math.abs(dx);
    s.face = Math.sign(dx) || 1;

    if(s.state === 'walk'){
      const spd = (s.type === 1 ? 55 : 92) + stage * 7;
      if(adx > s.range) s.x += s.face * spd * dt;
      else if(adx < 110) s.x -= s.face * spd * 0.7 * dt;
      s.x = clamp(s.x, 30, worldEnd - 30);
      s.atkCd -= dt;
      if(s.atkCd <= 0 && adx < s.range + 60){
        if(adx < 150 && Math.random() < 0.5){
          s.state = 'yell'; s.stateT = 0;
          addBubble(s.x, s.y - 78 * s.scale, pick(YELLS));
        }else{
          s.state = 'throw'; s.stateT = 0;
        }
      }
    }else if(s.state === 'throw'){
      s.stateT += dt;
      if(s.stateT > 0.45 && !s.thrown){
        s.thrown = true;
        const n = s.type === 1 ? 3 : 1;
        for(let k = 0; k < n; k++){
          const a = Math.atan2((p.y - 45) - (s.y - 50 * s.scale), p.x - s.x) + (k - (n-1)/2) * 0.18;
          const sp = 270 + stage * 18;
          angerShots.push({ x: s.x + s.face * 12, y: s.y - 50 * s.scale,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, rot: rnd(0, 6.28) });
        }
      }
      if(s.stateT > 0.7){ s.state = 'walk'; s.thrown = false; s.atkCd = rnd(1.6, 2.8) / (1 + stage * 0.08); }
    }else if(s.state === 'yell'){
      s.stateT += dt;
      if(s.stateT > 0.3 && !s.yelled){
        s.yelled = true;
        if(adx < 180 && Math.abs(p.y - s.y) < 80 && p.inv <= 0){
          hurtPlayer(10);
          p.vx += s.face * 260;
        }
        shake = Math.max(shake, 5);
      }
      if(s.stateT > 0.8){ s.state = 'walk'; s.yelled = false; s.atkCd = rnd(1.8, 3) / (1 + stage * 0.08); }
    }
    if(adx < 42 * S && Math.abs(p.y - s.y) < 60){
      if(Math.abs(p.vx) > 140){
        // 体当たり！スピードに乗っていれば吹き飛ばす
        s.hp -= 6 * MUL; s.flinch = 0.2;
        s.x += Math.sign(p.vx) * 46;
        sparks(s.x, s.y - 40, 6, '#ffd24d');
        addSp(3);
      }else if(p.inv <= 0){
        hurtPlayer(6);
        s.x -= s.face * 30;
      }
    }
  }

  // --- 怒り弾 💢 ---
  for(let i = angerShots.length - 1; i >= 0; i--){
    const e = angerShots[i];
    e.vy += 220 * dt;
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.rot += dt * 8;
    let dead = e.y > GROUND || e.x < camX - 80 || e.x > camX + W + 80;
    if(e.y > GROUND) dust(e.x, GROUND, 2, '#c98', 30);
    if(!dead && p.inv <= 0 && !opFx &&
       e.x > p.x - 40 * S && e.x < p.x + 40 * S && e.y > p.y - 80 * S && e.y < p.y){
      hurtPlayer(e.dmg || 8); dead = true;
    }
    if(dead) angerShots.splice(i, 1);
  }

  // --- 建機ボス＆応援重機 ---
  if(boss && state === 'play') updateBoss(dt);
  if(allies.length) updateAllies(dt);

  // --- カラスの襲来（ステージ3以降） ---
  if(state === 'play' && stage >= 3){
    birdTimer -= dt;
    const maxBirds = Math.min(diff >= 3 ? 9 : 6, Math.round(Math.floor((stage - 1) / 2) * DIFFS[diff].enemy));
    if(birdTimer <= 0 && birds.length < maxBirds){
      birdTimer = rnd(3.5, 7) / ((1 + stage * 0.08) * (0.6 + 0.4 * DIFFS[diff].enemy));
      const side = Math.random() < 0.5 ? -1 : 1;
      birds.push({ x: side === -1 ? camX - 40 : camX + W + 40, y: rnd(50, 170),
                   vx: -side * (120 + stage * 10), t: rnd(0, 6), hp: 2, poopCd: rnd(0.8, 2) });
    }
  }
  for(let i = birds.length - 1; i >= 0; i--){
    const bd = birds[i];
    bd.t += dt;
    bd.x += bd.vx * dt * (weather === 'storm' ? 1.35 : 1);
    bd.y += Math.sin(bd.t * 3) * 24 * dt;
    bd.poopCd -= dt;
    if(bd.poopCd <= 0 && Math.abs(bd.x - p.x) < 170){
      bd.poopCd = rnd(1.6, 3);
      poops.push({ x: bd.x, y: bd.y + 10, vx: rnd(-15, 15), vy: 60 });
    }
    if(bd.hp <= 0){
      addScore(100, bd.x, bd.y);
      heartsBurst(bd.x, bd.y, 5, 70);
      addText(bd.x, bd.y - 20, 'カーッ！？', '#fff');
      birds.splice(i, 1);
      continue;
    }
    if(Math.abs(bd.x - p.x) < 50 * S && bd.y > p.y - 110 * S && bd.y < p.y) bd.hp = 0;  // 機体に激突
    if(bd.x < camX - 260 || bd.x > camX + W + 260) birds.splice(i, 1);
  }
  // フン爆弾
  for(let i = poops.length - 1; i >= 0; i--){
    const q = poops[i];
    q.vy += 500 * dt; q.x += q.vx * dt; q.y += q.vy * dt;
    let dead = false;
    if(q.y > GROUND){ dead = true; dust(q.x, GROUND, 2, '#e8e4d8', 30); }
    if(!dead && p.inv <= 0 && !opFx &&
       q.x > p.x - 40 * S && q.x < p.x + 40 * S && q.y > p.y - 90 * S && q.y < p.y){
      hurtPlayer(6); dead = true;
      addText(p.x, p.y - 115, 'ふんっ！？', '#fff');
    }
    if(dead) poops.splice(i, 1);
  }

  // --- お宝（捨て猫・人骨・お札） ---
  for(let i = pickups.length - 1; i >= 0; i--){
    const q = pickups[i];
    if(!q.grounded){
      q.vy += 700 * dt; q.x += q.vx * dt; q.y += q.vy * dt;
      if(q.y >= GROUND){ q.y = GROUND; q.grounded = true; }
    }
    q.life -= dt;
    if(q.life <= 0){ pickups.splice(i, 1); continue; }
    if(Math.abs(q.x - p.x) < 55 * S && q.y > p.y - 70){
      collectPickup(q);
      pickups.splice(i, 1);
    }
  }

  // --- 助っ人散水職人 ---
  if(state === 'play' && !sprayer){
    sprayTimer -= dt;
    if(sprayTimer <= 0){
      sprayTimer = rnd(20, 32);
      const angry0 = sups.filter(s => s.state === 'walk' || s.state === 'throw' || s.state === 'yell');
      if(angry0.length >= 1){
        const dir = Math.random() < 0.5 ? 1 : -1;
        sprayer = { x: dir === 1 ? camX - 30 : camX + W + 30, dir,
                    state: 'in', t: 0, face: dir, aimX: 0 };
        addBubble(clamp(sprayer.x, camX + 60, camX + W - 60), GROUND - 90, '散水入りまーす！');
      }
    }
  }
  if(sprayer){
    const sw = sprayer;
    sw.t += dt;
    const angry = sups.filter(s => s.state === 'walk' || s.state === 'throw' || s.state === 'yell');
    if(sw.state === 'in'){
      sw.x += sw.dir * 160 * dt;
      sw.face = sw.dir;
      const tx2 = p.x - sw.dir * 240;
      if((sw.dir === 1 && sw.x >= tx2) || (sw.dir === -1 && sw.x <= tx2) || sw.t > 5){
        sw.state = 'spray'; sw.t = 0;
      }
    }else if(sw.state === 'spray'){
      let tgt = null, bd2 = 1e9;
      for(const s of angry){ const d = Math.abs(s.x - sw.x); if(d < bd2){ bd2 = d; tgt = s; } }
      sw.aimX = tgt ? tgt.x : sw.x + sw.face * 250;
      sw.face = Math.sign(sw.aimX - sw.x) || 1;
      // 放水（消防用ホース）
      for(let k = 0; k < 3; k++){
        const dist2 = sw.aimX - sw.x;
        parts.push({ type: 'water', x: sw.x + sw.face * 16, y: GROUND - 42,
          vx: dist2 * rnd(0.85, 1.15), vy: -Math.abs(dist2) * rnd(0.5, 0.7) - 60,
          size: rnd(3, 6), life: rnd(0.7, 1.0), maxLife: 1.0, col: '#58b8f0' });
      }
      for(const s of angry){
        if(Math.abs(s.x - sw.aimX) < 75){
          s.hp -= 10 * dt; s.flinch = 0.1;
          s.x += sw.face * 26 * dt;
          if(Math.random() < dt * 5) addText(s.x, s.y - 95, 'びしょ濡れ！', '#58b8f0');
        }
      }
      if(sw.t > 5.5){ sw.state = 'out'; sw.t = 0; addBubble(sw.x, GROUND - 90, 'また呼んでや〜'); }
    }else{
      sw.x -= sw.dir * 180 * dt;
      sw.face = -sw.dir;
      if(sw.t > 6 || sw.x < camX - 70 || sw.x > camX + W + 70) sprayer = null;
    }
  }

  // --- パーティクル ---
  for(let i = parts.length - 1; i >= 0; i--){
    const q = parts[i];
    q.life -= dt;
    if(q.life <= 0){ parts.splice(i, 1); continue; }
    if(q.type === 'rock' || q.type === 'cap'){
      q.vy += 900 * dt; q.x += q.vx * dt; q.y += q.vy * dt; q.rot += q.vr * dt;
      if(q.y > GROUND){ q.y = GROUND; q.vy *= -0.4; q.vx *= 0.6; }
    }else if(q.type === 'dust'){
      q.x += q.vx * dt; q.y += q.vy * dt; q.vy -= 30 * dt; q.size += 18 * dt;
    }else if(q.type === 'heart'){
      q.x += q.vx * dt; q.y += q.vy * dt; q.vy -= 60 * dt; q.vx *= (1 - dt * 2);
    }else if(q.type === 'heartfall'){
      q.y += q.vy * dt; q.x += Math.sin(tGlobal * 4 + q.ph) * 30 * dt;
      if(q.y > GROUND) q.life = Math.min(q.life, 0.15);
    }else if(q.type === 'smoke'){
      q.x += q.vx * dt; q.y += q.vy * dt; q.size += 10 * dt;
    }else if(q.type === 'star'){
      q.x += q.vx * dt; q.y += q.vy * dt; q.rot += (q.vr || 4) * dt;
    }else if(q.type === 'water'){
      q.vy += 700 * dt; q.x += q.vx * dt; q.y += q.vy * dt;
      if(q.y > GROUND){ q.y = GROUND; q.life = Math.min(q.life, 0.06); }
    }else{
      q.x += q.vx * dt; q.y += q.vy * dt; q.vy += 500 * dt;
    }
  }
  for(let i = texts.length - 1; i >= 0; i--){
    texts[i].y -= 40 * dt; texts[i].life -= dt;
    if(texts[i].life <= 0) texts.splice(i, 1);
  }
  for(let i = bubbles.length - 1; i >= 0; i--){
    bubbles[i].life -= dt;
    if(bubbles[i].life <= 0) bubbles.splice(i, 1);
  }
  for(const b of buildings) if(b.shakeT > 0) b.shakeT -= dt;

  // --- クリア判定（ビル全壊＋ボス撃破） ---
  if(state === 'play' && !boss && buildings.every(b => b.destroyed)){
    state = 'clear'; stateTimer = 2.6; sfxClear();
    beamSoundOff();
    for(let k = 0; k < 14; k++) heartFall(camX + rnd(0, W), -rnd(0, 120));
  }
  if(state === 'clear'){
    stateTimer -= dt;
    if(stateTimer <= 0){
      if(stage >= MAX_STAGE){
        state = 'ending';
        beamHeld = false; beamSoundOff();
        saveRankEntry();
      }else{
        startStage(stage + 1); state = 'play';
      }
    }
  }
  // 演出タイマー類
  if(stageIntroT > 0) stageIntroT -= raw;
  if(spookyT > 0) spookyT -= raw;
  if(lightningT > 0) lightningT -= raw;
  if(weather === 'storm' && Math.random() < raw * 0.12) lightningT = 0.14;
}

// ---------- オペレーター更新 ----------
function updateOp(raw){
  const o = opFx, p = player;
  o.t += raw; o.total += raw;
  p.inv = Math.max(p.inv, 0.12);   // 出動中は重機も無敵

  if(o.phase === 'out'){
    // 降臨シーン：本人もふわりと舞い降りる（世界は超スロー）
    const sr = raw * 0.45;
    o.vy += 1500 * sr;
    o.x += o.vx * sr; o.y += o.vy * sr;
    if(Math.random() < raw * 14) stars(o.x + rnd(-28, 28), o.y + rnd(-34, 20), 1);
    if(Math.random() < raw * 9) heartDrift(o.x + rnd(-32, 32), o.y);
    if(o.y >= GROUND){
      o.y = GROUND; o.phase = 'run'; o.t = 0;
      dust(o.x, GROUND, 10, '#b9aa98', 80);
      shake = Math.max(shake, 6);
    }
  }else if(o.phase === 'run'){
    const tgt = nearestSmackable();
    if(tgt) o.targetX = tgt.x;
    o.face = Math.sign(o.targetX - o.x) || o.face;
    o.x += o.face * 520 * raw;
    if(Math.random() < raw * 18) dust(o.x - o.face * 14, GROUND, 1, '#c4b6a0', 40);
    if(Math.abs(o.x - o.targetX) < 64 || o.t > 1.6){
      o.phase = 'windup'; o.t = 0;
      addText(o.x, GROUND - 100, '……ッ！', '#fff', true);
    }
  }else if(o.phase === 'windup'){
    if(o.t > 0.55){ o.phase = 'swing'; o.t = 0; }
  }else if(o.phase === 'swing'){
    if(!o.hit && o.t > 0.1){
      o.hit = true;
      const ix = o.x + o.face * 55;
      // 地球を揺るがす一撃
      shake = 45;
      flashT = 0.22;
      sfxBoom(true); sfxCrush();
      setTimeout(() => sfxBoom(true), 130);
      dust(ix, GROUND, 24, '#cbbfae', 160);
      sparks(ix, GROUND - 20, 20, '#ffd24d');
      stars(ix, GROUND - 30, 12);
      heartsBurst(ix, GROUND - 40, 12, 160);
      rubble(ix, GROUND - 10, 14);
      // 直撃範囲のビルは即解体
      for(const b of buildings){
        b._gw = false;
        if(b.destroyed) continue;
        const c = b.x + b.w / 2;
        if(Math.abs(c - ix) < 240){
          b._gw = true;
          damageBuilding(b, 9999, clamp(ix, b.x, b.x + b.w), GROUND - 40);
        }
      }
      // ボスにも超ダメージ
      if(boss){
        boss._gw = false;
        if(Math.abs(boss.x - ix) < 260) damageBoss(130, boss.x, GROUND - 60);
      }
      for(const s of sups){
        if(s.state === 'soothed' || s.state === 'smacked') continue;
        if(Math.abs(s.x - ix) < 200) smackSup(s, o.face);
      }
      // 地面を走る地震波（画面の隅々まで）
      gWave = { x: ix, r: 60, t: 0 };
      if(player.onGround){ player.vy = -300; player.onGround = false; }
      addText(ix, GROUND - 120, 'ドゴォォォォン！！！', '#fff', true);
      // 衝撃でタオルが吹っ飛ぶ→スキンヘッド露出！
      o.capOff = true;
      parts.push({ type: 'cap', x: o.x, y: o.y - 80,
        vx: -o.face * rnd(80, 140), vy: rnd(-420, -330),
        rot: 0, vr: rnd(-9, 9), size: 11,
        life: 2.4, maxLife: 2.4, col: '#f8f8f4' });
      addText(o.x, GROUND - 160, '（タオルが吹っ飛んだ）', '#fff');
    }
    if(o.t > 0.6){ o.phase = 'back'; o.t = 0; }
  }else if(o.phase === 'back'){
    o.face = Math.sign(p.x - o.x) || 1;
    o.x += o.face * 520 * raw;
    if(Math.abs(o.x - p.x) < 26 || o.t > 2.4){
      o.phase = 'in'; o.t = 0; o.vy = -520;
    }
  }else if(o.phase === 'in'){
    o.vy += 1500 * raw;
    o.y += o.vy * raw;
    o.x = lerp(o.x, p.x + p.turn * 10, Math.min(1, raw * 8));
    if(o.t > 0.5 || o.y < p.y - 86){
      opFx = null;
      addText(p.x, p.y - 120, '仕事に戻るか…', '#fff');
    }
  }
}

function smackSup(s, dir){
  s.state = 'smacked';
  s.vx = dir * rnd(650, 850); s.vy = rnd(-700, -480); s.spin = 0;
  addScore(400, s.x, s.y - 80);
  addText(s.x, s.y - 105, '一発説得！！', '#ffe14d', true);
  addBubble(s.x, s.y - 130, pick(['すまんかったァァ！', '出直しますゥゥ！', 'うわらばっ！']));
  addKill();
}

// ---------- 建機ボス ----------
function bossForStage(n){
  if(n === 2)  return { kind: 'dozer',  name: 'ドーザー番長',     hp: 60,  bw: 150, bh: 86 };
  if(n === 4)  return { kind: 'dump',   name: 'ダンプ大王',       hp: 95,  bw: 180, bh: 95 };
  if(n === 6)  return { kind: 'crane',  name: 'ミスター鉄球',     hp: 130, bw: 130, bh: 170 };
  if(n === 8)  return { kind: 'shovel', name: '黒鋼ショベル',     hp: 165, bw: 150, bh: 120 };
  if(n === 10) return { kind: 'king',   name: '魔王クラッシャー', hp: 240, bw: 200, bh: 160 };
  return null;
}
function updateBoss(dt){
  const b = boss, p = player;
  b.t += dt;
  if(b.flinch > 0) b.flinch -= dt;
  const dx = p.x - b.x, adx = Math.abs(dx);
  if(!b.intro){
    if(adx < 560){
      b.intro = true;
      addBubble(b.x, GROUND - 140, b.name + '、見参！！');
      shake = Math.max(shake, 9);
      sfxBoom(false);
    }else return;
  }
  b.face = Math.sign(dx) || 1;
  if(b.kind === 'dozer'){
    // 突進→ひと休み の繰り返し
    if(b.state !== 'turn'){
      b.vx = lerp(b.vx, b.face * (235 + diff * 45 + stage * 5), Math.min(1, dt * 2));
      b.x += b.vx * dt;
      if(Math.random() < dt * 9) dust(b.x - Math.sign(b.vx) * 75, GROUND, 1, '#c4b6a0', 50);
      if(adx < 75 && p.inv <= 0 && p.y > GROUND - 90){
        hurtPlayer(12);
        p.vx = b.face * 430; p.vy = -220; p.onGround = false;
      }
      b.stateT += dt;
      if(b.stateT > 2.6){ b.state = 'turn'; b.stateT = 0; }
    }else{
      b.vx = 0; b.stateT += dt;
      if(Math.random() < dt * 6) smoke(b.x - b.face * 55, GROUND - 70, true);
      if(b.stateT > 1.0){ b.state = 'charge'; b.stateT = 0; }
    }
  }else if(b.kind === 'dump'){
    // 距離を取りつつ荷台から岩を投げ落とす
    if(adx < 270) b.x -= b.face * 120 * dt;
    else if(adx > 430) b.x += b.face * 135 * dt;
    b.stateT += dt;
    b.dumpA = Math.max(0, b.dumpA - dt * 2);
    if(b.stateT > 2.7 - diff * 0.4){
      b.stateT = 0; b.dumpA = 0.8;
      sfxClank();
      for(let k = 0; k < 3 + diff; k++){
        angerShots.push({ x: b.x - b.face * 45, y: GROUND - 95,
          vx: b.face * rnd(0.6, 1.1) * adx * 0.9, vy: rnd(-440, -310),
          rot: rnd(0, 6), rock: true, dmg: 10 });
      }
    }
  }else if(b.kind === 'crane'){
    // 鉄球の振り子！本体を攻撃しよう
    if(adx > 300) b.x += b.face * 45 * dt;
    b.ballA = Math.sin(b.t * (1.2 + diff * 0.15)) * 1.05;
    const tipX = b.x + b.face * 26, tipY = GROUND - b.bh + 14;
    b.ballX = tipX + Math.sin(b.ballA) * 132;
    b.ballY = tipY + Math.cos(b.ballA) * 132;
    if(p.inv <= 0 && Math.hypot(p.x - b.ballX, (p.y - 45) - b.ballY) < 36 + 30 * (p.scl || 1)){
      hurtPlayer(14);
      p.vx = Math.sign(p.x - b.ballX) * 470; p.vy = -260; p.onGround = false;
    }
  }else{
    // 黒鋼ショベル／魔王クラッシャー
    const big = b.kind === 'king';
    if(adx > (big ? 210 : 175)) b.x += b.face * (big ? 100 : 72) * dt;
    b.stateT += dt;
    if(b.swingT > 0) b.swingT -= dt;
    const cyc = (big ? 2.1 : 2.7) - diff * 0.3;
    if(b.stateT > cyc){
      b.stateT = 0;
      if(adx < (big ? 250 : 205)){
        b.swingT = 0.45;
        shake = Math.max(shake, 9);
        dust(b.x + b.face * 130, GROUND, 9, '#cbbfae', 95);
        sfxCrush();
        if(p.inv <= 0 && adx < (big ? 250 : 205) && p.y > GROUND - 100){
          hurtPlayer(12); p.vx = b.face * 390;
        }
      }else{
        sfxClank();
        const n = big ? 3 : 2;
        for(let k = 0; k < n; k++){
          const a = Math.atan2((p.y - 50) - (GROUND - 120), dx) + (k - (n - 1) / 2) * 0.17;
          const sp = 300 + diff * 45;
          angerShots.push({ x: b.x + b.face * 85, y: GROUND - 120,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, rot: rnd(0, 6), rock: true, dmg: 10 });
        }
      }
    }
  }
  b.x = clamp(b.x, 80, worldEnd - 80);
}
function damageBoss(d, hx, hy, quiet){
  if(!boss || !boss.intro) return;
  boss.hp -= d; boss.flinch = 0.15;
  if(!quiet){ sparks(hx || boss.x, hy || (GROUND - 60), 6, '#ffd24d'); sfxClank(); }
  if(boss.hp <= 0){
    const b = boss; boss = null;
    sfxBoom(true); shake = Math.max(shake, 20);
    rubble(b.x, GROUND - 50, 30);
    sparks(b.x, GROUND - 60, 24, '#ffd24d');
    stars(b.x, GROUND - 70, 14);
    dust(b.x, GROUND - 30, 18, '#999', 120);
    heartsBurst(b.x, GROUND - 60, 16, 150);
    addScore(2500 + stage * 250, b.x, GROUND - 120);
    addText(b.x, GROUND - 152, b.name + 'を解体！！', '#ffe14d', true);
    // ボスは必ず応援無線機を落とす
    pickups.push({ type: 'radio', x: b.x, y: GROUND - 60, vx: rnd(-30, 30), vy: -180, life: 12, grounded: false });
    addSp(25);
    addKill();
  }
}
function hazard(x, y, w2, h2){
  // 黄黒の警戒ストライプ
  cx.save();
  roundRect(x, y, w2, h2, 3); cx.clip();
  for(let i = -1; i < w2 / 12 + 2; i++){
    cx.fillStyle = i % 2 ? '#ffce3a' : '#2a2a30';
    cx.save(); cx.translate(x + i * 12, y); cx.rotate(0.5);
    cx.fillRect(0, -8, 8, h2 + 18);
    cx.restore();
  }
  cx.restore();
}
function drawBoss(b){
  cx.save();
  const fl = b.flinch > 0 ? rnd(-3, 3) : 0;
  cx.translate(b.x + fl, GROUND);
  cx.fillStyle = 'rgba(0,0,0,.2)';
  cx.beginPath(); cx.ellipse(0, 5, b.bw * 0.55, 9, 0, 0, 7); cx.fill();
  cx.save();
  cx.scale(b.face, 1);   // 右向き基準
  if(b.kind === 'dozer'){
    cx.fillStyle = '#3a3a42';
    roundRect(-66, -28, 132, 28, 13); cx.fill();
    cx.fillStyle = '#55555e';
    for(let i = 0; i < 5; i++){ cx.beginPath(); cx.arc(-48 + i * 24, -14, 7, 0, 7); cx.fill(); }
    cx.fillStyle = '#4a4a50';
    roundRect(-58, -62, 100, 36, 6); cx.fill();
    hazard(-58, -36, 100, 9);
    cx.fillStyle = '#2e2e36';
    roundRect(-26, -90, 46, 30, 5); cx.fill();
    cx.fillStyle = '#9fb8c8';
    roundRect(-21, -86, 36, 16, 3); cx.fill();
    cx.fillStyle = '#3a3a42';
    cx.fillRect(-50, -76, 7, 16);
    // 巨大ブレード
    cx.fillStyle = '#8a8a92';
    cx.beginPath();
    cx.moveTo(46, -64); cx.quadraticCurveTo(72, -52, 72, -2);
    cx.lineTo(50, -2); cx.lineTo(46, -40);
    cx.closePath(); cx.fill();
    cx.strokeStyle = '#5a5a62'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(50, -54); cx.lineTo(68, -44); cx.stroke();
    cx.strokeStyle = '#4a4a52'; cx.lineWidth = 6;

// ---------- 応援のピンク重機（応援無線機） ----------
function spawnAllies(){
  for(let i = 0; i < 3; i++){
    allies.push({
      x: camX - 60 - i * 95, y: GROUND, vx: 0, vy: 0,
      facing: 1, turn: 1, tx: 400, ty: 300, scl: 0.6, armMul: 1,
      pitch: 0, tread: 0, jaw: 0.2, inv: 0, smokeT: rnd(0, 0.3), heartT: 0,
      crushT: 0, biteCd: rnd(0.4, 1.2), life: 16 + i * 1.5, empty: false
    });
  }
  addText(player.x, player.y - 150, '📻 仲間のピンク重機が応援に来た！！', '#ffe14d', true);
  sfxClear();
}
function updateAllies(dt){
  for(let i = allies.length - 1; i >= 0; i--){
    const a = allies[i];
    a.life -= dt;
    if(a.life <= 0 || (a.life < 2.5 && a.x < camX - 200)){
      heartsBurst(a.x, a.y - 50, 8, 80);
      allies.splice(i, 1);
      continue;
    }
    // ターゲット（ボス＞監督＞ビル の近い順）
    let tx = null, ty = GROUND - 60, kind = null, ref = null, bd2 = 1e9;
    const cand = [];
    if(boss && boss.intro) cand.push({ x: boss.x, y: GROUND - boss.bh * 0.5, k: 'boss', ref: boss });
    for(const s of sups){
      if(s.state === 'walk' || s.state === 'throw' || s.state === 'yell')
        cand.push({ x: s.x, y: s.y - 40, k: 'sup', ref: s });
    }
    for(const b of buildings){
      if(!b.destroyed) cand.push({ x: b.x + b.w / 2, y: GROUND - Math.min(b.h * 0.5, 80), k: 'bld', ref: b });
    }
    for(const c of cand){
      const d = Math.abs(c.x - a.x);
      if(d < bd2){ bd2 = d; tx = c.x; ty = c.y; kind = c.k; ref = c.ref; }
    }
    if(a.life < 2.5){
      // 「ほな帰るわ〜」
      a.vx = lerp(a.vx, -240, Math.min(1, dt * 3));
      a.x += a.vx * dt;
      a.facing = -1;
      if(Math.random() < dt * 4) heartDrift(a.x, a.y - 60);
    }else if(tx !== null){
      const dir = Math.sign(tx - a.x) || 1;
      const want = Math.abs(tx - a.x) > 105 ? dir * 175 : 0;
      a.vx = lerp(a.vx, want, Math.min(1, dt * 3));
      a.x += a.vx * dt;
      if(want !== 0) a.facing = dir;
      a.tx = tx; a.ty = ty;
      a.biteCd -= dt;
      if(a.biteCd <= 0 && Math.abs(tx - a.x) < 150){
        a.biteCd = 0.85;
        a.crushT = 0.25;
        const t2 = ik(a);
        const jx = t2.tx + Math.cos(t2.a2) * 30, jy = t2.ty + Math.sin(t2.a2) * 30;
        rubble(jx, jy, 2); heartsBurst(jx, jy, 2, 50); sfxClank();
        if(kind === 'bld') damageBuilding(ref, 5, jx, jy, true);
        else if(kind === 'sup'){ ref.hp -= 5; ref.flinch = 0.2; }
        else damageBoss(5, jx, jy, true);
      }
    }
    a.turn = lerp(a.turn, a.facing, Math.min(1, dt * 5));
    a.tread += a.vx * dt;
    let jt = 0.2;
    if(a.crushT > 0){ jt = a.crushT > 0.13 ? 0.5 : 0.04; a.crushT -= dt; }
    a.jaw = lerp(a.jaw, jt, Math.min(1, dt * 14));
    a.smokeT -= dt;
    if(a.smokeT <= 0){ a.smokeT = 0.3; smoke(a.x - a.turn * 22, a.y - 46, Math.abs(a.vx) > 50); }
  }
}

}

// ---------- ランキング ----------
function loadRank(){
  try{ return JSON.parse(localStorage.getItem('kikukenRank')) || []; }catch(e){ return []; }
}
function saveRankEntry(){
  if(rankSaved || score <= 0) return;
  rankSaved = true;
  let r = loadRank();
  if(r.length < 5 || score > r[r.length - 1].score){
    let name = '';
    try{ name = prompt('🏆 ランクイン！名前を入力してください：', '解体王') || ''; }catch(e){}
    name = (name.trim() || '名無しの解体王').slice(0, 10);
    r.push({ name, score, stage, mode: diff });
    r.sort((a, b) => b.score - a.score);
    r = r.slice(0, 5);
    localStorage.setItem('kikukenRank', JSON.stringify(r));
  }
}

// ---------- 重機パワーアップ ----------
function addKill(){
  const p = player;
  p.kills++;
  if(p.lv < 3 && p.kills >= LV_KILLS[p.lv]) levelUp();
}
function levelUp(){
  const p = player;
  p.lv++;
  p.scl = LV_SCALE[p.lv - 1];
  p.maxHp += 30;
  p.hp = Math.min(p.maxHp, p.hp + 40);
  flashT = Math.max(flashT, 0.18);
  shake = Math.max(shake, 14);
  sfxClear(); sfxBoom(true);
  heartsBurst(p.x, p.y - 60, 24, 180);
  stars(p.x, p.y - 70, 10);
  dust(p.x, GROUND, 12, '#c4b6a0', 110);
  addText(p.x, p.y - 150, 'パワーアップ！！', '#ffe14d', true);
  addText(p.x, p.y - 118, '重機 LV' + p.lv + '：巨大化＆火力アップ！', '#fff');
}

function pick(arr){ return arr[Math.random() * arr.length | 0]; }
function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

function spawnSup(){
  const side = Math.random() < 0.5 ? -1 : 1;
  let x = side === -1 ? camX - 50 : camX + W + 50;
  x = clamp(x, 30, worldEnd - 30);
  const type = (stage >= 2 && Math.random() < 0.35) ? 1 : 0;
  const shp = Math.round((type === 1 ? 18 : 9) * DIFFS[diff].ehp);
  sups.push({
    x, y: GROUND, type,
    scale: type === 1 ? 1.25 : 1,
    hp: shp,
    maxHp: shp,
    t: rnd(0, 6), face: 1, state: 'walk', stateT: 0,
    range: rnd(230, 330), atkCd: rnd(0.8, 1.6),
    flinch: 0, thrown: false, yelled: false, sootheT: 0, spin: 0
  });
}

function hurtPlayer(dmg){
  dmg = Math.round(dmg * DIFFS[diff].dmg);   // 難易度で被ダメージ増
  player.hp -= dmg; player.inv = 1.0;
  player.guts = clamp(player.guts + 8, 0, 100);   // 殴られるほど漢気が滾る
  sfxHurt(); shake = Math.max(shake, 8);
  sparks(player.x, player.y - 40, 10, '#ff6b6b');
  if(player.hp <= 0){
    player.hp = 0;
    state = 'gameover';
    beamHeld = false; beamSoundOff();
    spFx = null; opFx = null;
    sfxBoom(true);
    rubble(player.x, player.y - 30, 24);
    dust(player.x, player.y - 20, 16, '#999');
    saveRankEntry();
  }
}

function damageBuilding(b, dmg, hx, hy, quiet){
  b.hp -= dmg; b.shakeT = 0.2;
  if(!quiet){ rubble(hx, hy, 5); dust(hx, hy, 4, '#cbbfae'); sfxClank(); }
  if(b.hp <= 0 && !b.destroyed){
    b.destroyed = true;
    sfxBoom(true);
    shake = Math.max(shake, b.landmark ? 18 : 12);
    const bcx = b.x + b.w/2;
    rubble(bcx, GROUND - b.h/2, b.landmark ? 40 : 26);
    heartsBurst(bcx, GROUND - b.h/2, b.landmark ? 18 : 10, 150);
    for(let k = 0; k < (b.landmark ? 14 : 8); k++) dust(b.x + rnd(0, b.w), GROUND - rnd(0, b.h), 4, '#c9bcab', 110);
    if(b.landmark){
      const bonus = 2000 + stage * 300;
      addScore(bonus, bcx, GROUND - b.h - 20);
      addText(bcx, GROUND - b.h - 56, b.name + '、解体完了！！', '#ffe14d', true);
      spawnPickup(bcx, GROUND - b.h / 2);   // 名所からは必ずお宝
      addSp(20);
    }else{
      const bonus = 500 + Math.round(b.h) * 2;
      addScore(bonus, bcx, GROUND - b.h - 20);
      addText(bcx, GROUND - b.h - 50, '解体完了！', PINK, true);
      if(Math.random() < 0.3) spawnPickup(bcx, GROUND - b.h / 2);
      addSp(14);
    }
  }
}

// ---------- 描画 ----------
function draw(){
  cx.save();
  cx.clearRect(0, 0, W, H);

  // 天候で空の色を変える
  const SKYS = {
    sun:   ['#7ec8ee', '#cfeaf7', '#e8f4f8'],
    rain:  ['#8aa0b8', '#b8c8d4', '#ccd8e0'],
    snow:  ['#a8b8c8', '#d8e2ec', '#eef2f6'],
    storm: ['#4a5468', '#76808f', '#9aa4b4'],
  };
  const sc = (state === 'title') ? SKYS.sun : (SKYS[weather] || SKYS.sun);
  const sky = cx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, sc[0]); sky.addColorStop(0.7, sc[1]); sky.addColorStop(1, sc[2]);
  cx.fillStyle = sky; cx.fillRect(0, 0, W, H);
  // 雷（台風）
  if(lightningT > 0 && state !== 'title'){
    cx.fillStyle = 'rgba(255,255,240,' + Math.min(0.55, lightningT * 4) + ')';
    cx.fillRect(0, 0, W, H);
  }

  const sx = (Math.random()*2-1) * shake, sy = (Math.random()*2-1) * shake;
  cx.translate(sx, sy);

  // --- 演出ズーム（必殺技・ハンマー時にグッと寄る） ---
  let zoomed = false;
  if(state !== 'title'){
    let zt = 1;
    if(spFx && spFx.t < 1.35) zt = 1.22;
    if(opFx){
      zt = opFx.phase === 'out' ? 1.42
         : (opFx.phase === 'windup' || opFx.phase === 'swing') ? 1.28 : 1.08;
    }
    zoomCur = lerp(zoomCur, zt, 0.13);
    if(zoomCur > 1.005){
      const focus = spFx ? spFx.x : opFx ? opFx.x : player.x;
      const fx = clamp(focus - camX, 220, W - 220), fy = H * 0.58;
      cx.save();
      cx.translate(fx, fy); cx.scale(zoomCur, zoomCur); cx.translate(-fx, -fy);
      zoomed = true;
    }
  }else{
    zoomCur = 1;
  }

  // 雲
  cx.fillStyle = 'rgba(255,255,255,.85)';
  for(let i = 0; i < 6; i++){
    const cxx = ((i * 290 + 100 - camX * 0.1 + tGlobal * 6) % (W + 300)) - 150;
    cloud(cxx, 50 + (i % 3) * 38, 1 + (i % 2) * 0.5);
  }
  // 遠景
  cx.fillStyle = '#b4c4d4';
  for(let i = 0; i < 14; i++){
    const bx = ((i * 130 - camX * 0.25) % (W + 260)) - 130;
    const bh = 90 + ((i * 53) % 110);
    cx.fillRect(bx, GROUND - bh - 20, 80, bh + 20);
  }
  cx.strokeStyle = '#9aa8b8'; cx.lineWidth = 2;
  for(let i = 0; i < 3; i++){
    const tx = ((i * 420 + 200 - camX * 0.3) % (W + 500)) - 200;
    pylon(tx, GROUND - 10);
  }
  // 地面
  cx.fillStyle = '#a89880'; cx.fillRect(-200, GROUND, W + 400, H - GROUND + 200);
  cx.fillStyle = '#8f8068'; cx.fillRect(-200, GROUND, W + 400, 6);
  cx.fillStyle = 'rgba(0,0,0,.08)';
  for(let i = 0; i < 30; i++){
    const gx = ((i * 67 - camX) % (W + 80) + W + 80) % (W + 80) - 40;
    cx.fillRect(gx, GROUND + 14 + (i % 4) * 12, 24, 4);
  }

  if(state === 'title'){ drawTitle(); cx.restore(); return; }

  cx.save();
  cx.translate(-camX, 0);

  // 養生フェンス
  for(let fx = 0; fx < worldEnd; fx += 90){
    if(fx + 90 < camX - 100 || fx > camX + W + 100) continue;
    cx.fillStyle = (fx / 90) % 2 ? '#3f6fb5' : '#4a7cc4';
    cx.fillRect(fx, GROUND - 46, 88, 46);
    cx.strokeStyle = 'rgba(255,255,255,.25)'; cx.lineWidth = 1;
    cx.strokeRect(fx + 2, GROUND - 44, 84, 42);
  }

  for(const b of buildings) drawBuilding(b);
  for(const q of pickups) drawPickup(q);
  if(boss) drawBoss(boss);
  for(const al of allies) drawExcavator(al);
  for(const s of sups) drawSup(s);
  if(sprayer) drawSprayer(sprayer);
  for(const bd of birds) drawBird(bd);
  for(const q of poops) drawPoop(q);

  if(beamRay) drawBeam(beamRay);

  drawExcavator(player);

  // オペレーター
  if(opFx) drawOperator(opFx.x, opFx.y, opFx.face, opFx.phase, opFx.t);

  for(const e of angerShots){
    if(e.rock){
      cx.save(); cx.translate(e.x, e.y); cx.rotate(e.rot);
      cx.fillStyle = '#8a8478';
      cx.fillRect(-8, -7, 16, 13);
      cx.fillStyle = '#6e695f';
      cx.fillRect(-4, -7, 7, 5);
      cx.restore();
    }else drawAnger(e.x, e.y, 10, e.rot);
  }

  // 地震波
  if(gWave){
    const ga = clamp(1 - gWave.t / 0.85, 0, 1);
    cx.strokeStyle = 'rgba(255,255,255,' + (0.75 * ga) + ')';
    cx.lineWidth = 7;
    cx.beginPath(); cx.arc(gWave.x, GROUND, gWave.r, Math.PI, 0); cx.stroke();
    cx.strokeStyle = 'rgba(255,46,146,' + (0.5 * ga) + ')';
    cx.lineWidth = 14;
    cx.beginPath(); cx.arc(gWave.x, GROUND, gWave.r * 0.92, Math.PI, 0); cx.stroke();
  }

  // パーティクル
  for(const q of parts){
    const a = Math.max(0, q.life / q.maxLife);
    if(q.type === 'dust'){
      cx.fillStyle = q.col; cx.globalAlpha = a * 0.5;
      cx.beginPath(); cx.arc(q.x, q.y, q.size, 0, 7); cx.fill();
      cx.globalAlpha = 1;
    }else if(q.type === 'smoke'){
      cx.fillStyle = q.col; cx.globalAlpha = a * 0.35;
      cx.beginPath(); cx.arc(q.x, q.y, q.size, 0, 7); cx.fill();
      cx.globalAlpha = 1;
    }else if(q.type === 'rock'){
      cx.save(); cx.translate(q.x, q.y); cx.rotate(q.rot);
      cx.fillStyle = q.col;
      cx.fillRect(-q.size/2, -q.size/2, q.size, q.size * 0.8);
      cx.restore();
    }else if(q.type === 'cap'){
      // 吹っ飛んだ白タオル帽子
      cx.save(); cx.translate(q.x, q.y); cx.rotate(q.rot);
      cx.globalAlpha = Math.min(1, a * 2);
      cx.fillStyle = q.col;
      cx.beginPath(); cx.arc(0, 0, q.size, Math.PI, 0); cx.fill();
      cx.beginPath(); cx.ellipse(0, 0, q.size, q.size * 0.32, 0, 0, 7); cx.fill();
      cx.strokeStyle = '#d4d4cc'; cx.lineWidth = 1.2;
      cx.beginPath(); cx.ellipse(0, 0, q.size, q.size * 0.32, 0, 0, 7); cx.stroke();
      cx.globalAlpha = 1;
      cx.restore();
    }else if(q.type === 'heart' || q.type === 'heartfall'){
      cx.globalAlpha = a;
      heart(q.x, q.y, q.size * 0.6, q.col);
      cx.globalAlpha = 1;
    }else if(q.type === 'star'){
      cx.save(); cx.translate(q.x, q.y); cx.rotate(q.rot || 0);
      cx.strokeStyle = q.col; cx.lineWidth = 2.5; cx.globalAlpha = a;
      cx.beginPath();
      cx.moveTo(-q.size, 0); cx.lineTo(q.size, 0);
      cx.moveTo(0, -q.size); cx.lineTo(0, q.size);
      cx.stroke();
      cx.globalAlpha = 1; cx.restore();
    }else if(q.type === 'water'){
      cx.fillStyle = q.col; cx.globalAlpha = a * 0.75;
      cx.beginPath(); cx.arc(q.x, q.y, q.size, 0, 7); cx.fill();
      cx.globalAlpha = 1;
    }else{
      cx.fillStyle = q.col; cx.globalAlpha = a;
      cx.fillRect(q.x - q.size/2, q.y - q.size/2, q.size, q.size);
      cx.globalAlpha = 1;
    }
  }

  if(spFx) drawSpecialWorld();

  for(const t of texts){
    cx.globalAlpha = Math.max(0, Math.min(1, t.life));
    cx.font = (t.big ? 'bold 26px ' : 'bold 20px ') + FONT;
    cx.textAlign = 'center';
    cx.strokeStyle = 'rgba(0,0,0,.5)'; cx.lineWidth = 3;
    cx.strokeText(t.str, t.x, t.y);
    cx.fillStyle = t.col;
    cx.fillText(t.str, t.x, t.y);
    cx.globalAlpha = 1;
  }
  for(const b of bubbles) drawBubble(b);

  cx.restore(); // camera
  if(zoomed) cx.restore(); // zoom

  drawWeatherFx();
  if(spookyT > 0){
    cx.fillStyle = 'rgba(40,20,70,' + (spookyT * 0.4) + ')';
    cx.fillRect(0, 0, W, H);
  }

  if(spFx) drawSpecialScreen();
  if(opFx) drawOpCutin();
  if(flashT > 0){
    cx.fillStyle = 'rgba(255,255,255,' + (flashT / 0.22 * 0.85) + ')';
    cx.fillRect(0, 0, W, H);
  }

  drawHUD();
  drawCinema();

  // ステージ開始の目標表示
  if(stageIntroT > 0 && state === 'play'){
    const a = clamp(Math.min(stageIntroT * 2, (3.4 - stageIntroT) * 3), 0, 1);
    cx.globalAlpha = a;
    cx.fillStyle = 'rgba(0,0,0,.55)';
    roundRect(W/2 - 240, 56, 480, 66, 12); cx.fill();
    cx.textAlign = 'center';
    cx.fillStyle = '#fff'; cx.font = 'bold 20px ' + FONT;
    cx.fillText('STAGE ' + stage + ' ／ 天気 ' + WICON[weather], W/2, 84);
    const lm = buildings.find(b => b.landmark);
    cx.fillStyle = '#ffe14d'; cx.font = 'bold 16px ' + FONT;
    cx.fillText('目標：' + (lm ? lm.name : '全ビル') + ' を解体せよ！', W/2, 110);
    cx.globalAlpha = 1;
  }
  if(state === 'clear') banner('STAGE ' + stage + ' クリア！', stage >= MAX_STAGE ? '……これで全現場、完工！' : '次の現場へ移動中…');
  if(state === 'gameover'){
    cx.fillStyle = 'rgba(40,20,40,.65)'; cx.fillRect(0, 0, W, H);
    cx.textAlign = 'center';
    cx.fillStyle = PINK;
    cx.font = 'bold 44px ' + FONT;
    cx.fillText('監督の怒りが頂点に…', W/2, H/2 - 110);
    cx.fillStyle = '#fff';
    cx.font = 'bold 24px ' + FONT;
    cx.fillText('SCORE: ' + score + '   HI-SCORE: ' + hiscore, W/2, H/2 - 66);
    // ランキング TOP5
    const r = loadRank();
    cx.fillStyle = '#ffd0e4';
    cx.font = 'bold 16px ' + FONT;
    cx.fillText('— 🏆 解体王ランキング TOP5 —', W/2, H/2 - 26);
    cx.font = 'bold 15px ' + FONT;
    if(r.length === 0){
      cx.fillStyle = '#fff';
      cx.fillText('まだ記録なし', W/2, H/2 + 2);
    }
    r.forEach((e, i) => {
      cx.fillStyle = i === 0 ? '#ffe14d' : '#fff';
      cx.fillText((i + 1) + '位　' + e.name + '　' + e.score + '点（S' + e.stage + '・' + DIFFS[e.mode || 0].name + '）', W/2, H/2 + 2 + i * 24);
    });
    cx.fillStyle = '#fff';
    cx.font = '18px ' + FONT;
    cx.fillText('クリック／タップ または R でタイトルへ', W/2, H/2 + 140);
  }
  if(state === 'ending'){
    cx.fillStyle = 'rgba(255,46,146,.2)'; cx.fillRect(0, 0, W, H);
    for(let i = 0; i < 22; i++){
      const a2 = tGlobal * 1.4 + i * 1.7;
      heart(W/2 + Math.cos(a2) * (130 + (i % 5) * 70),
            H/2 - 30 + Math.sin(a2 * 1.3) * (100 + (i % 4) * 45),
            8 + (i % 3) * 5, i % 2 ? PINK_L : PINK);
    }
    cx.fillStyle = 'rgba(0,0,0,.55)';
    roundRect(W/2 - 310, H/2 - 130, 620, 250, 16); cx.fill();
    cx.textAlign = 'center';
    cx.fillStyle = '#ffe14d';
    cx.font = 'bold 44px ' + FONT;
    cx.fillText('🎉 全現場制覇！！ 🎉', W/2, H/2 - 72);
    cx.fillStyle = '#fff';
    cx.font = 'bold 20px ' + FONT;
    cx.fillText('全10ステージ、日本中の名所を解体完了！', W/2, H/2 - 32);
    cx.fillText('これぞ菊建魂。おつかれさまでした！', W/2, H/2 - 4);
    cx.font = 'bold 32px ' + FONT;
    cx.fillStyle = PINK_L;
    cx.fillText('FINAL SCORE：' + score, W/2, H/2 + 46);
    cx.fillStyle = '#fff';
    cx.font = '17px ' + FONT;
    if(Math.floor(tGlobal * 1.6) % 2 === 0) cx.fillText('クリック／タップでタイトルへ', W/2, H/2 + 92);
  }
  cx.restore();
}

// オペレーター降臨カットイン（超スロー演出）
function drawOpCutin(){
  const o = opFx;
  let k = 0;
  if(o.phase === 'out') k = clamp(o.t / 0.12, 0, 1);
  else if(o.phase === 'run') k = clamp(1 - o.t / 0.35, 0, 1);
  if(k <= 0.01) return;
  cx.save();
  cx.globalAlpha = k;
  // 画面暗転
  cx.fillStyle = 'rgba(10,5,20,.45)';
  cx.fillRect(0, 0, W, H);
  // オペレーターのスクリーン座標（ズーム補正込み）
  const fx = clamp(o.x - camX, 220, W - 220), fy = H * 0.58;
  const sxp = fx + (o.x - camX - fx) * zoomCur;
  const syp = fy + (o.y - fy) * zoomCur;
  const gyp = fy + (GROUND - fy) * zoomCur;
  // 天からのスポットライト
  const g = cx.createLinearGradient(0, 0, 0, gyp);
  g.addColorStop(0, 'rgba(255,255,230,.8)');
  g.addColorStop(1, 'rgba(255,255,230,.06)');
  cx.fillStyle = g;
  cx.beginPath();
  cx.moveTo(sxp - 18, -10); cx.lineTo(sxp + 18, -10);
  cx.lineTo(sxp + 100, gyp); cx.lineTo(sxp - 100, gyp);
  cx.closePath(); cx.fill();
  // キラキラ
  for(let i = 0; i < 8; i++){
    const a2 = tGlobal * 2 + i * 0.785;
    const rr = 60 + (i % 3) * 28;
    const px2 = sxp + Math.cos(a2) * rr, py2 = syp + Math.sin(a2) * rr * 0.6;
    cx.save(); cx.translate(px2, py2); cx.rotate(a2);
    cx.strokeStyle = 'rgba(255,255,200,.85)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(-6, 0); cx.lineTo(6, 0); cx.moveTo(0, -6); cx.lineTo(0, 6); cx.stroke();
    cx.restore();
  }
  // カットイン帯＋セリフ
  const yC = H * 0.22;
  cx.fillStyle = 'rgba(20,12,30,.85)';
  cx.save();
  cx.transform(1, 0, -0.35, 1, 0, 0);
  cx.fillRect(80, yC - 36, W + 200, 72);
  cx.restore();
  cx.fillStyle = 'rgba(255,225,77,.9)';
  cx.save();
  cx.transform(1, 0, -0.35, 1, 0, 0);
  cx.fillRect(80, yC + 28, W + 200, 6);
  cx.restore();
  cx.textAlign = 'center';
  cx.font = 'bold 15px ' + FONT;
  cx.fillStyle = '#ffe14d';
  cx.fillText('⚒ 最終手段 ⚒', W/2, yC - 14);
  cx.font = 'bold 38px ' + FONT;
  cx.strokeStyle = '#000'; cx.lineWidth = 7;
  cx.strokeText('「楽勝です！楽勝です！」', W/2, yC + 20);
  cx.fillStyle = '#fff';
  cx.fillText('「楽勝です！楽勝です！」', W/2, yC + 20);
  cx.restore();
}

// シネマ黒帯（必殺技・ハンマー中）
function drawCinema(){
  let k = 0;
  if(spFx) k = clamp(spFx.t / 0.2, 0, 1) * clamp((2.1 - spFx.t) / 0.3, 0, 1);
  if(opFx){
    let ko = clamp(opFx.total / 0.25, 0, 1);
    if(opFx.phase === 'in') ko *= clamp(1 - opFx.t / 0.4, 0, 1);
    k = Math.max(k, ko);
  }
  if(k > 0.01){
    cx.fillStyle = '#000';
    cx.fillRect(0, 0, W, 46 * k);
    cx.fillRect(0, H - 46 * k, W, 46 * k);
  }
}

function cloud(x, y, s){
  cx.beginPath();
  cx.arc(x, y, 18 * s, 0, 7);
  cx.arc(x + 22 * s, y - 8 * s, 22 * s, 0, 7);
  cx.arc(x + 48 * s, y, 17 * s, 0, 7);
  cx.fill();
}
function pylon(x, baseY){
  cx.beginPath();
  cx.moveTo(x - 22, baseY); cx.lineTo(x - 6, baseY - 130);
  cx.lineTo(x + 6, baseY - 130); cx.lineTo(x + 22, baseY);
  cx.moveTo(x - 14, baseY - 60); cx.lineTo(x + 14, baseY - 60);
  cx.moveTo(x - 26, baseY - 95); cx.lineTo(x + 26, baseY - 95);
  cx.moveTo(x - 10, baseY - 130); cx.lineTo(x + 10, baseY - 118);
  cx.stroke();
}

// ---------- ビル ----------
function drawBuilding(b){
  if(b.landmark){ drawLandmark(b); return; }
  if(b.destroyed){
    cx.fillStyle = '#938878';
    cx.beginPath();
    cx.moveTo(b.x - 10, GROUND);
    cx.quadraticCurveTo(b.x + b.w * 0.3, GROUND - 36 - (b.seed % 12), b.x + b.w * 0.55, GROUND - 26);
    cx.quadraticCurveTo(b.x + b.w * 0.8, GROUND - 38, b.x + b.w + 10, GROUND);
    cx.fill();
    cx.fillStyle = '#7d7264';
    for(let i = 0; i < 7; i++){
      const rx = b.x + ((b.seed * (i+3) * 37) % b.w);
      cx.fillRect(rx, GROUND - 14 - ((b.seed * (i+1)) % 18), 9, 7);
    }
    return;
  }
  const shx = b.shakeT > 0 ? (Math.random()*2-1) * 4 : 0;
  const bx = b.x + shx, by = GROUND - b.h;
  const ratio = b.hp / b.maxHp;
  const tone = ['#ded7c9', '#cfc6b4', '#b8ad99'][b.seed % 3];
  cx.fillStyle = tone;
  cx.fillRect(bx, by, b.w, b.h);
  cx.fillStyle = 'rgba(0,0,0,.15)';
  cx.fillRect(bx, by, b.w, 8);
  const cols = Math.max(2, b.w / 38 | 0), rows = Math.max(2, b.h / 42 | 0);
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      const wx = bx + 12 + c * ((b.w - 24) / cols);
      const wy = by + 16 + r * ((b.h - 24) / rows);
      const broken = ((b.seed + r * 7 + c * 13) % 10) / 10 > ratio;
      cx.fillStyle = broken ? '#4a4438' : '#7fb2d6';
      cx.fillRect(wx, wy, (b.w - 24) / cols - 8, (b.h - 24) / rows - 10);
    }
  }
  if(ratio < 0.66){
    cx.strokeStyle = 'rgba(50,40,30,.55)'; cx.lineWidth = 2;
    crack(bx + b.w * 0.3, by + b.h * 0.2, b.seed);
  }
  if(ratio < 0.33){
    crack(bx + b.w * 0.7, by + b.h * 0.5, b.seed + 5);
    cx.fillStyle = 'rgba(60,50,40,.18)';
    cx.fillRect(bx, by, b.w, b.h);
  }
  if(ratio < 1){
    cx.fillStyle = 'rgba(0,0,0,.4)';
    cx.fillRect(bx, by - 14, b.w, 7);
    cx.fillStyle = ratio > 0.5 ? '#7ad36b' : ratio > 0.25 ? '#ffd24d' : '#ff5252';
    cx.fillRect(bx, by - 14, b.w * ratio, 7);
  }
}
function crack(x, y, seed){
  cx.beginPath(); cx.moveTo(x, y);
  let cxp = x, cyp = y;
  for(let i = 0; i < 5; i++){
    cxp += (((seed * (i+2) * 31) % 30) - 15);
    cyp += 14 + ((seed * (i+1)) % 16);
    cx.lineTo(cxp, cyp);
  }
  cx.stroke();
}

// ---------- 名所ランドマーク（デフォルメ） ----------
function drawLandmark(b){
  if(b.destroyed){
    cx.fillStyle = '#938878';
    cx.beginPath();
    cx.moveTo(b.x - 16, GROUND);
    cx.quadraticCurveTo(b.x + b.w * 0.3, GROUND - 52, b.x + b.w * 0.55, GROUND - 38);
    cx.quadraticCurveTo(b.x + b.w * 0.8, GROUND - 56, b.x + b.w + 16, GROUND);
    cx.fill();
    cx.fillStyle = '#7d7264';
    for(let i = 0; i < 12; i++){
      cx.fillRect(b.x + (i * 73) % b.w, GROUND - 18 - ((i * 37) % 26), 10, 8);
    }
    return;
  }
  const shx = b.shakeT > 0 ? (Math.random()*2-1) * 4 : 0;
  const x = b.x + shx, w = b.w, h = b.h, gy = GROUND, top = gy - h, cxm = x + w/2;
  const ratio = b.hp / b.maxHp;
  cx.save();
  drawLandmarkShape(b.kind, x, cxm, w, h, gy, top);
  if(ratio < 0.66){
    cx.strokeStyle = 'rgba(40,30,20,.6)'; cx.lineWidth = 2.5;
    crack(cxm - w * 0.2, top + h * 0.3, 11);
  }
  if(ratio < 0.33){
    crack(cxm + w * 0.12, top + h * 0.5, 17);
    cx.fillStyle = 'rgba(60,50,40,.15)';
    cx.fillRect(x, top, w, h);
  }
  cx.restore();
  // 名前プレート＆ボスHPバー
  cx.fillStyle = 'rgba(0,0,0,.55)';
  roundRect(cxm - 95, top - 44, 190, 32, 8); cx.fill();
  cx.fillStyle = '#ffe14d';
  cx.font = 'bold 13px ' + FONT; cx.textAlign = 'center';
  cx.fillText('🚧 ' + b.name, cxm, top - 30);
  cx.fillStyle = 'rgba(0,0,0,.4)';
  cx.fillRect(cxm - 88, top - 22, 176, 6);
  cx.fillStyle = ratio > 0.5 ? '#7ad36b' : ratio > 0.25 ? '#ffd24d' : '#ff5252';
  cx.fillRect(cxm - 88, top - 22, 176 * ratio, 6);
}
function drawLandmarkShape(kind, x, cxm, w, h, gy, top){
  if(kind === 1){
    // 東京タワー：赤白の鉄塔
    cx.fillStyle = '#e8553a';
    cx.beginPath();
    cx.moveTo(x, gy); cx.lineTo(cxm - w*0.07, top + 16); cx.lineTo(cxm + w*0.07, top + 16); cx.lineTo(x + w, gy);
    cx.closePath(); cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,.55)'; cx.lineWidth = 2;
    for(let i = 1; i < 6; i++){
      const t2 = i / 6, lw = lerp(w/2, w*0.07, t2);
      cx.beginPath(); cx.moveTo(cxm - lw, gy - (h - 16) * t2); cx.lineTo(cxm + lw, gy - (h - 16) * t2); cx.stroke();
    }
    cx.fillStyle = '#f4f4f0';
    cx.fillRect(cxm - w*0.24, gy - h*0.42, w*0.48, 16);
    cx.fillRect(cxm - w*0.13, gy - h*0.72, w*0.26, 12);
    cx.strokeStyle = '#c44432'; cx.lineWidth = 2;
    cx.strokeRect(cxm - w*0.24, gy - h*0.42, w*0.48, 16);
    cx.strokeStyle = '#e8553a'; cx.lineWidth = 4;
    cx.beginPath(); cx.moveTo(cxm, top + 16); cx.lineTo(cxm, top - 6); cx.stroke();
  }else if(kind === 2){
    // スカイツリー：銀色の電波塔
    cx.fillStyle = '#cdd8e2';
    cx.beginPath();
    cx.moveTo(cxm - w*0.26, gy); cx.lineTo(cxm - w*0.06, top + 30);
    cx.lineTo(cxm + w*0.06, top + 30); cx.lineTo(cxm + w*0.26, gy);
    cx.closePath(); cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,.6)'; cx.lineWidth = 1.5;
    for(let i = 1; i < 8; i++){
      const t2 = i / 8, lw = lerp(w*0.26, w*0.06, t2);
      cx.beginPath();
      cx.moveTo(cxm - lw, gy - (h - 30) * t2); cx.lineTo(cxm + lw * 0.6, gy - (h - 30) * (t2 + 0.1));
      cx.moveTo(cxm + lw, gy - (h - 30) * t2); cx.lineTo(cxm - lw * 0.6, gy - (h - 30) * (t2 + 0.1));
      cx.stroke();
    }
    cx.fillStyle = '#eef4f8'; cx.strokeStyle = '#8aa'; cx.lineWidth = 2;
    cx.beginPath(); cx.ellipse(cxm, gy - h*0.56, w*0.2, 11, 0, 0, 7); cx.fill(); cx.stroke();
    cx.beginPath(); cx.ellipse(cxm, gy - h*0.8, w*0.13, 8, 0, 0, 7); cx.fill(); cx.stroke();
    cx.strokeStyle = '#cdd8e2'; cx.lineWidth = 3.5;
    cx.beginPath(); cx.moveTo(cxm, top + 30); cx.lineTo(cxm, top - 8); cx.stroke();
  }else if(kind === 3){
    // 六本木ヒルズ：くびれた高層タワー
    cx.fillStyle = '#5a6a78';
    cx.beginPath();
    cx.moveTo(x + w*0.06, gy);
    cx.quadraticCurveTo(x + w*0.14, gy - h*0.55, x + w*0.2, top + 16);
    cx.quadraticCurveTo(cxm, top - 6, x + w*0.8, top + 16);
    cx.quadraticCurveTo(x + w*0.86, gy - h*0.55, x + w*0.94, gy);
    cx.closePath(); cx.fill();
    cx.strokeStyle = 'rgba(180,200,215,.5)'; cx.lineWidth = 2.5;
    for(let i = 0; i < 8; i++){
      const lx2 = x + w*0.16 + i * (w*0.68 / 7);
      cx.beginPath(); cx.moveTo(lx2, top + 22); cx.lineTo(lx2 - w*0.02, gy - 4); cx.stroke();
    }
    cx.fillStyle = 'rgba(140,170,190,.35)';
    cx.fillRect(x + w*0.18, gy - h*0.4, w*0.64, 10);
  }else if(kind === 4){
    // 日本武道館：緑の大屋根と金の擬宝珠
    cx.fillStyle = '#f0ede4';
    cx.fillRect(x + w*0.14, gy - h*0.48, w*0.72, h*0.48);
    cx.strokeStyle = '#b8b0a0'; cx.lineWidth = 2;
    cx.strokeRect(x + w*0.14, gy - h*0.48, w*0.72, h*0.48);
    cx.fillStyle = '#5a4a3a';
    cx.fillRect(cxm - w*0.07, gy - h*0.26, w*0.14, h*0.26);
    cx.fillStyle = '#4a7a5a';
    cx.beginPath();
    cx.moveTo(x - 8, gy - h*0.46);
    cx.quadraticCurveTo(cxm, top + 4, x + w + 8, gy - h*0.46);
    cx.lineTo(x + w*0.82, gy - h*0.56);
    cx.quadraticCurveTo(cxm, top - 4, x + w*0.18, gy - h*0.56);
    cx.closePath(); cx.fill();
    cx.beginPath();
    cx.moveTo(x + w*0.16, gy - h*0.56);
    cx.quadraticCurveTo(cxm, top - 10, x + w*0.84, gy - h*0.56);
    cx.lineTo(cxm + w*0.2, gy - h*0.72);
    cx.quadraticCurveTo(cxm, top - 14, cxm - w*0.2, gy - h*0.72);
    cx.closePath(); cx.fill();
    cx.fillStyle = '#f0c040';
    cx.beginPath(); cx.arc(cxm, top + 8, 9, 0, 7); cx.fill();
  }else if(kind === 5){
    // 東京都庁：ツインタワー
    cx.fillStyle = '#b8bcc8';
    cx.fillRect(x, gy - h*0.4, w, h*0.4);
    cx.fillStyle = '#a8aebc';
    cx.fillRect(x + w*0.04, gy - h*0.4, w*0.36, -(h*0.6) + 18);
    cx.fillRect(x + w*0.6, gy - h*0.4, w*0.36, -(h*0.6) + 18);
    cx.fillStyle = '#98a0b0';
    cx.beginPath();
    cx.moveTo(x + w*0.04, top + 18); cx.lineTo(x + w*0.13, top); cx.lineTo(x + w*0.22, top + 18);
    cx.closePath(); cx.fill();
    cx.beginPath();
    cx.moveTo(x + w*0.22, top + 26); cx.lineTo(x + w*0.31, top + 8); cx.lineTo(x + w*0.4, top + 26);
    cx.closePath(); cx.fill();
    cx.beginPath();
    cx.moveTo(x + w*0.6, top + 26); cx.lineTo(x + w*0.69, top + 8); cx.lineTo(x + w*0.78, top + 26);

    cx.beginPath();

  }else if(kind === 6){

    cx.quadraticCurveTo(cxm, top - 8, x - 4, top + 6);

    // 大提灯
    cx.fillStyle = '#d8342a';
    cx.beginPath(); cx.ellipse(cxm, gy - h*0.34, w*0.18, h*0.26, 0, 0, 7); cx.fill();
    cx.strokeStyle = 'rgba(60,20,15,.4)'; cx.lineWidth = 1.5;
    for(let i = 1; i < 5; i++){
      cx.beginPath(); cx.ellipse(cxm, gy - h*0.34, w*0.18 * Math.sin(i * 0.628), h*0.26, 0, 0, 7); cx.stroke();
    }
    cx.fillStyle = '#2a2a2a';
    cx.fillRect(cxm - w*0.1, gy - h*0.62, w*0.2, 8);

  }else if(kind === 8){

    cx.stroke();
    cx.fillStyle = '#c8c0b0';
    cx.fillRect(cxm - w*0.13, gy - h*0.82, w*0.26, h*0.48);
    // 広告板（菊建興業！）
    cx.fillStyle = PINK;
    cx.fillRect(cxm - w*0.16, gy - h*0.66, w*0.32, h*0.2);
    cx.fillStyle = '#fff';
    cx.font = 'bold ' + Math.round(h*0.085) + 'px ' + FONT;
    cx.textAlign = 'center';
    cx.fillText('菊建', cxm, gy - h*0.55);
    // 展望台
    cx.fillStyle = '#e8e4d8';
    roundRect(cxm - w*0.3, top + 14, w*0.6, 26, 8); cx.fill();
    cx.strokeStyle = '#9a9486'; cx.lineWidth = 2;
    roundRect(cxm - w*0.3, top + 14, w*0.6, 26, 8); cx.stroke();
    cx.fillStyle = '#c8c0b0';
    cx.beginPath(); cx.arc(cxm, top + 12, w*0.14, Math.PI, 0); cx.fill();
    cx.strokeStyle = '#c8c0b0'; cx.lineWidth = 3;
    cx.beginPath(); cx.moveTo(cxm, top + 2); cx.lineTo(cxm, top - 10); cx.stroke();
  }else if(kind === 9){
    // 大阪城
    cx.fillStyle = '#9a9486';
    cx.beginPath();
    cx.moveTo(x - 6, gy); cx.lineTo(x + w*0.12, gy - h*0.3);
    cx.lineTo(x + w*0.88, gy - h*0.3); cx.lineTo(x + w + 6, gy);
    cx.closePath(); cx.fill();
    for(let i = 0; i < 3; i++){
      const tw2 = w * (0.62 - i * 0.14), ty2 = gy - h*0.3 - i * h*0.2, th2 = h*0.16;
      cx.fillStyle = '#f4f2ea';
      cx.fillRect(cxm - tw2/2, ty2 - th2, tw2, th2);

      cx.beginPath();

    cx.fillStyle = '#3e7a52';
    cx.beginPath();
    cx.moveTo(cxm - w*0.16, gy - h*0.3 - h*0.56);

    // 国会議事堂

    for(let r = 0; r < 3; r++){
