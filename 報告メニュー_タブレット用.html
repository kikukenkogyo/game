<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>報告メニュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  :root{
    --bg-kogu:#E3F0FF; --ac-kogu:#1D6FE0; --nm-kogu:#1457B0;
    --bg-gas:#FFEEDD;  --ac-gas:#F47A1F;  --nm-gas:#C85A0C;
    --bg-att:#E2F6E9;  --ac-att:#1F9E54;  --nm-att:#167A40;
  }
  body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;color:#1F2421;}
  .root{min-height:100vh;background:#EDEBE6;display:flex;flex-direction:column;padding:3.6vh 3.4vw 3vh;}
  .head{flex:0 0 auto;text-align:center;padding-bottom:9vh;}
  .head h1{margin:0;font-weight:900;font-size:clamp(28px,3.4vw,48px);letter-spacing:.02em;line-height:1.1;}
  .grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6.6vw;align-content:safe center;justify-content:center;width:100%;max-width:1600px;max-height:660px;margin:0 auto;padding:1.2vh 1vw 2vh;}
  .card{text-decoration:none;color:inherit;border-radius:22px;border:2px solid;box-shadow:0 22px 40px rgba(31,36,33,.32),0 8px 14px rgba(31,36,33,.22),0 2px 4px rgba(31,36,33,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3vh 1.6vw 2.4vh;transition:transform .1s ease,box-shadow .1s ease;}
  .card:active{transform:translateY(6px) scale(.965);box-shadow:0 6px 12px rgba(31,36,33,.22);}
  .icon{width:clamp(134px,12.5vw,188px);height:clamp(134px,12.5vw,188px);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;}
  .title{font-weight:900;line-height:1.15;margin-top:3vh;height:clamp(96px,9.6vw,138px);display:flex;align-items:center;justify-content:center;white-space:nowrap;}
  .chips{display:flex;gap:7px;flex-wrap:nowrap;justify-content:center;margin-top:1.8vh;}
  .chips span{border:2px solid;border-radius:999px;padding:5px 11px;font-weight:700;font-size:clamp(13px,1.4vw,20px);white-space:nowrap;}
  .report{margin-top:3vh;padding-top:2.4vh;width:100%;min-height:clamp(98px,10vw,138px);font-size:clamp(16px,1.75vw,24px);font-weight:500;line-height:1.55;}
  .report .lbl{display:block;font-weight:700;font-size:.78em;letter-spacing:.1em;margin-bottom:6px;}
  /* 工具 */
  .c-kogu{background:var(--bg-kogu);border-color:var(--ac-kogu);}
  .c-kogu .icon{background:var(--ac-kogu);}
  .c-kogu .title{font-size:clamp(40px,4.3vw,66px);line-height:1.05;color:var(--nm-kogu);}
  .c-kogu .chips span{border-color:var(--ac-kogu);color:var(--ac-kogu);}
  .c-kogu .report{color:#46505A;}
  .c-kogu .report .lbl{color:var(--ac-kogu);}
  /* ガス */
  .c-gas{background:var(--bg-gas);border-color:var(--ac-gas);}
  .c-gas .icon{background:var(--ac-gas);}
  .c-gas .title{font-size:clamp(32px,3.6vw,54px);color:var(--nm-gas);}
  .c-gas .chips span{border-color:var(--ac-gas);color:var(--ac-gas);}
  .c-gas .report{color:#5C4A3B;}
  .c-gas .report .lbl{color:var(--ac-gas);}
  /* アタッチ */
  .c-att{background:var(--bg-att);border-color:var(--ac-att);}
  .c-att .icon{background:var(--ac-att);}
  .c-att .title{font-size:clamp(36px,4vw,60px);color:var(--nm-att);}
  .c-att .chips span{border-color:var(--ac-att);color:var(--ac-att);}
  .c-att .report{color:#4C5645;}
  .c-att .report .lbl{color:var(--ac-att);}
</style>
</head>
