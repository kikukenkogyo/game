<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>菊建クラッシャー 対戦 ～水玉重機タイマン～</title>
<style>
  html,body{margin:0;padding:0;background:#241a30;height:100%;overflow:hidden;overscroll-behavior:none;font-family:"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;}
  #wrap{position:relative;display:flex;align-items:center;justify-content:center;height:100%;}
  canvas{background:#9ad6f0;box-shadow:0 0 40px rgba(255,46,146,.4);border-radius:8px;touch-action:none;-webkit-user-select:none;user-select:none;}
  #lobby{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;gap:14px;padding:18px;box-sizing:border-box;}
  #lobby.hidden{display:none;}
  #lobby h1{font-size:clamp(22px,6vw,40px);margin:0;color:#fff;text-shadow:0 2px 0 #d4147a,0 0 18px rgba(255,46,146,.6);}
  #lobby .sub{font-size:13px;opacity:.9;margin-top:-6px;}
  .btn{background:#ff2e92;color:#fff;border:none;border-radius:12px;padding:14px 26px;font-size:18px;font-weight:bold;
    box-shadow:0 4px 0 #b81570;cursor:pointer;min-width:220px;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b81570;}
  .btn.sub{background:#3a6ab8;box-shadow:0 4px 0 #244a86;}
  .btn.ghost{background:#555;box-shadow:0 4px 0 #333;min-width:0;padding:10px 18px;font-size:14px;}
  .panel{background:rgba(0,0,0,.45);border:2px solid #ff2e92;border-radius:14px;padding:18px 22px;max-width:520px;}
  .code{font-size:clamp(34px,11vw,64px);font-weight:bold;letter-spacing:.18em;color:#ffe14d;margin:6px 0;}
  input#joincode{font-size:30px;letter-spacing:.2em;text-align:center;text-transform:uppercase;width:200px;
    padding:8px;border-radius:10px;border:3px solid #ff2e92;background:#fff;color:#333;font-weight:bold;}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .msg{font-size:14px;min-height:18px;color:#ffd0e4;}
  .hint{font-size:12px;opacity:.75;max-width:460px;line-height:1.6;}
  a{color:#9effc8;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="lobby">
    <h1>菊建クラッシャー 対戦</h1>
    <div class="sub">～ ピンク水玉重機でタイマン勝負！ ～</div>
    <div id="menu" class="row">
      <button class="btn" id="bHost">🏠 部屋を作る（ホスト）</button>
      <button class="btn sub" id="bJoin">🔑 部屋に入る（ゲスト）</button>
    </div>
    <div id="hostBox" class="panel" style="display:none;">
      <div>あいことば（相手に伝えてね）</div>
      <div class="code" id="codeShow">----</div>
      <div class="msg" id="hostMsg">相手の入室を待っています…</div>
      <button class="btn ghost" id="bHostCancel">もどる</button>
    </div>
    <div id="joinBox" class="panel" style="display:none;">
      <div>あいことばを入力</div>
      <input id="joincode" maxlength="4" autocapitalize="characters" autocomplete="off" placeholder="____">
      <div class="row" style="margin-top:10px;">
        <button class="btn" id="bConnect">つなぐ</button>
        <button class="btn ghost" id="bJoinCancel">もどる</button>
      </div>
      <div class="msg" id="joinMsg"></div>
    </div>
    <div class="hint" id="hint">
      ※ オンライン対戦にはインターネット接続が必要です。2人とも同じ「あいことば」でつながります。<br>
      うまくつながらない時は、両者で一度「もどる」→もう一度お試しください。
    </div>
  </div>
</div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
"use strict";
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
const W = 960, H = 540, GROUND = H - 78;
const FONT = '"Hiragino Kaku Gothic ProN", Meiryo, sans-serif';
const PINK = '#ff2e92', PINK_D = '#d4147a', PINK_L = '#ff8fc6';
const ARENA_L = 40, ARENA_R = W - 40;
const ID_PREFIX = 'kikuken-taisen-';
const ALPHA = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';   // 紛らわしい文字を除外
const MATCH_TIME = 90;

function fit(){
  const s = Math.min(innerWidth / W, innerHeight / H) * 0.97;
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fit); fit();

// ---------- サウンド ----------
let AC = null;
function ac(){ if(!AC){ AC = new (window.AudioContext || window.webkitAudioContext)(); } return AC; }
function env(g,t,a,d){ g.gain.setValueAtTime(a,t); g.gain.exponentialRampToValueAtTime(0.001,t+d); }
function sfxHit(){ try{ const a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='square'; o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(50,t+0.15);
  env(g,t,0.25,0.16); o.connect(g).connect(a.destination); o.start(t); o.stop(t+0.18);}catch(e){} }
function sfxClank(){ try{ const a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(180,t+0.1);
  env(g,t,0.14,0.12); o.connect(g).connect(a.destination); o.start(t); o.stop(t+0.13);}catch(e){} }
function sfxBell(){ try{ const a=ac(),t=a.currentTime; [660,880,1100].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();
  o.type='triangle'; o.frequency.value=f; env(g,t+i*0.1,0.2,0.3); o.connect(g).connect(a.destination); o.start(t+i*0.1); o.stop(t+i*0.1+0.32);});}catch(e){} }

// ---------- 入力 ----------
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(e.code === 'KeyR' && phase === 'result' && net.isHost) hostRestart();
});
addEventListener('keyup', e => { keys[e.code] = false; });

// タッチボタン
const TB = {
  left:  { x: 72,      y: H - 56, r: 44, label: '◀' },
  right: { x: 180,     y: H - 56, r: 44, label: '▶' },
  jump:  { x: W - 180, y: H - 56, r: 44, label: '▲' },
  bite:  { x: W - 72,  y: H - 56, r: 50, label: '🦷' },
};
let touchMode = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchHit = {};
function tpos(t){ const r = cv.getBoundingClientRect(); return { x:(t.clientX-r.left)*W/r.width, y:(t.clientY-r.top)*H/r.height }; }
function btnAt(x,y){ for(const k in TB){ const b=TB[k]; if(Math.hypot(x-b.x,y-b.y)<=b.r+10) return k; } return null; }
cv.addEventListener('touchstart', e => {
  e.preventDefault(); touchMode = true; try{ ac().resume&&ac().resume(); }catch(_){}
  if(phase === 'result' && net.isHost){ hostRestart(); return; }
  for(const t of e.changedTouches){ const p=tpos(t),b=btnAt(p.x,p.y); if(b){ touchHit[t.identifier]=b; keys['T_'+b]=true; } }
}, {passive:false});
cv.addEventListener('touchmove', e => { e.preventDefault(); }, {passive:false});
function tend(e){ e.preventDefault(); for(const t of e.changedTouches){ const b=touchHit[t.identifier]; if(b){ keys['T_'+b]=false; delete touchHit[t.identifier]; } } }
cv.addEventListener('touchend', tend, {passive:false});
cv.addEventListener('touchcancel', tend, {passive:false});

function localInput(){
  return {
    left:  !!(keys['ArrowLeft']||keys['KeyA']||keys['T_left']),
    right: !!(keys['ArrowRight']||keys['KeyD']||keys['T_right']),
    jump:  !!(keys['ArrowUp']||keys['KeyW']||keys['T_jump']),
    bite:  !!(keys['Space']||keys['KeyJ']||keys['T_bite']),
  };
}

// ---------- ネットワーク（PeerJS / ホスト権限方式） ----------
const net = {
  peer: null, conn: null, isHost: false, connected: false,
  remoteInput: { left:false, right:false, jump:false, bite:false },
  netState: null, lastRecv: 0,
};
function randCode(){ let s=''; for(let i=0;i<4;i++) s += ALPHA[Math.floor(Math.random()*ALPHA.length)]; return s; }

function startHost(){
  const code = randCode();
  codeShow.textContent = code;
  showBox('hostBox');
  hostMsg.textContent = '通信の準備中…';
  net.isHost = true;
  try{
    net.peer = new Peer(ID_PREFIX + code, { debug: 1 });
  }catch(e){ hostMsg.textContent = '通信を開始できませんでした'; return; }
  net.peer.on('open', () => { hostMsg.textContent = '相手の入室を待っています…'; });
  net.peer.on('connection', c => { net.conn = c; wireConn(); });
  net.peer.on('error', err => {
    if(err.type === 'unavailable-id'){ // コード衝突→作り直し
      try{ net.peer.destroy(); }catch(_){}
      startHost();
    }else{
      hostMsg.textContent = '通信エラー：' + err.type + '（もどってやり直してください）';
    }
  });
}
function startJoin(){ showBox('joinBox'); joinMsg.textContent=''; setTimeout(()=>joincode.focus(),100); }
function doConnect(){
  const code = (joincode.value || '').toUpperCase().trim();
  if(code.length !== 4){ joinMsg.textContent = '4文字のあいことばを入れてください'; return; }
  joinMsg.textContent = 'つないでいます…';
  net.isHost = false;
  try{
    net.peer = new Peer({ debug: 1 });
  }catch(e){ joinMsg.textContent = '通信を開始できませんでした'; return; }
  net.peer.on('open', () => {
    const c = net.peer.connect(ID_PREFIX + code, { reliable: true });
    net.conn = c; wireConn();
  });
  net.peer.on('error', err => {
    joinMsg.textContent = (err.type === 'peer-unavailable')
      ? 'その部屋が見つかりません（あいことばを確認）' : '通信エラー：' + err.type;
  });
}
function wireConn(){
  const c = net.conn;
  c.on('open', () => {
    net.connected = true;
    lobby.classList.add('hidden');
    try{ ac().resume&&ac().resume(); }catch(_){}
    if(net.isHost){ startMatch(); broadcastState(true); }
  });
  c.on('data', d => {
    if(d.t === 'i'){ net.remoteInput = { left:!!d.l, right:!!d.r, jump:!!d.j, bite:!!d.b }; }
    else if(d.t === 's'){ net.netState = d.s; net.lastRecv = perfNow(); if(phase !== 'play' && !S.over) phase = 'play'; }
    else if(d.t === 'rs'){ if(!net.isHost){ applyServerStart(d); } }
    else if(d.t === 'bye'){ peerLost('相手が退出しました'); }
  });
  c.on('close', () => peerLost('接続が切れました'));
  c.on('error', () => peerLost('通信エラーが発生しました'));
}
function peerLost(msg){
  net.connected = false;
  phase = 'menu';
  lobby.classList.remove('hidden');
  showBox('menu');
  hostMsg.textContent = msg; joinMsg.textContent = msg;
  try{ net.conn && net.conn.close(); }catch(_){}
  try{ net.peer && net.peer.destroy(); }catch(_){}
  net.peer = null; net.conn = null;
}
function send(obj){ try{ if(net.conn && net.connected) net.conn.send(obj); }catch(e){} }

// ---------- 試合状態 ----------
let phase = 'menu';   // menu / play / result
let S = null;
let countdown = 0;
function mkPlayer(x, face){
  return { x, y: GROUND, vx:0, vy:0, onGround:true, hp:100, facing:face,
           biteT:0, biteCd:0, ramCd:0, inv:0, hitFlash:0, jaw:0.2, tread:0, pitch:0 };
}
function startMatch(){
  S = { p1: mkPlayer(ARENA_L + 130, 1), p2: mkPlayer(ARENA_R - 130, -1),
        t: 0, timer: MATCH_TIME, over: 0, fx: [] };
  countdown = 3.2;
  phase = 'play';
}
function applyServerStart(d){
  S = { p1: mkPlayer(ARENA_L + 130, 1), p2: mkPlayer(ARENA_R - 130, -1),
        t: 0, timer: MATCH_TIME, over: 0, fx: [] };
  countdown = 3.2; phase = 'play';
}
function hostRestart(){ startMatch(); send({ t:'rs' }); }

// ---------- シミュレーション（ホストのみが進める純粋関数的処理） ----------
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
function lerp(a,b,t){ return a+(b-a)*t; }
function stepPlayerKinematics(pl, inp, dt){
  let mv = (inp.right?1:0) - (inp.left?1:0);
  const target = mv * 250;
  pl.vx = lerp(pl.vx, target, Math.min(1, dt*2.6));
  if(Math.abs(pl.vx) < 4 && mv === 0) pl.vx = 0;
  if(mv !== 0) pl.facing = mv > 0 ? 1 : -1;
  if(inp.jump && pl.onGround){ pl.vy = -500; pl.onGround = false; }
  pl.vy += 1250 * dt;
  pl.x += pl.vx * dt; pl.y += pl.vy * dt;
  pl.x = clamp(pl.x, ARENA_L + 30, ARENA_R - 30);
  if(pl.y >= GROUND){ pl.y = GROUND; pl.vy = 0; pl.onGround = true; }
  pl.tread += pl.vx * dt;
  pl.pitch = lerp(pl.pitch, clamp(-pl.vx*0.0001,-0.05,0.05), Math.min(1,dt*5));
  if(pl.biteCd > 0) pl.biteCd -= dt;
  if(pl.ramCd > 0) pl.ramCd -= dt;
  if(pl.inv > 0) pl.inv -= dt;
  if(pl.hitFlash > 0) pl.hitFlash -= dt;
  // 噛みつき発動
  if(inp.bite && pl.biteCd <= 0 && pl.biteT <= 0){ pl.biteT = 0.32; pl.biteCd = 0.6; }
  if(pl.biteT > 0) pl.biteT -= dt;
  // 顎アニメ
  let jt = 0.2 + Math.sin(pl.tread*0.05)*0.02;
  if(pl.biteT > 0) jt = pl.biteT > 0.16 ? 0.55 : 0.0;
  pl.jaw = lerp(pl.jaw, jt, Math.min(1, dt*16));
}
function attackResolve(att, def, dt, fx){
  // 噛みつき：発動の中盤に前方ヒット
  if(att.biteT > 0.10 && att.biteT < 0.24 && def.inv <= 0){
    const reach = 78, fx0 = att.x + att.facing * 30;
    const tipX = att.x + att.facing * reach;
    if(((att.facing > 0 && def.x > att.x && def.x < tipX + 24) ||
        (att.facing < 0 && def.x < att.x && def.x > tipX - 24)) &&
       Math.abs(def.y - att.y) < 64){
      hitPlayer(def, att.facing, 14, fx, fx0, att.y - 50);
    }
  }
  // 体当たり：スピードが乗っていて接触
  if(Math.abs(att.vx) > 175 && att.ramCd <= 0 && def.inv <= 0){
    if(Math.abs(att.x - def.x) < 52 && Math.abs(att.y - def.y) < 56 &&
       Math.sign(att.vx) === Math.sign(def.x - att.x)){
      att.ramCd = 0.5;
      hitPlayer(def, Math.sign(att.vx), 7, fx, (att.x+def.x)/2, att.y - 46);
      att.vx *= -0.3;
    }
  }
}
function hitPlayer(def, dir, dmg, fx, fxx, fxy){
  def.hp = Math.max(0, def.hp - dmg);
  def.inv = 0.55; def.hitFlash = 0.3;
  def.vx = dir * 240; def.vy = -150; def.onGround = false;
  fx.push({ x: fxx, y: fxy, t: 0, big: dmg >= 12 });
}
function stepSim(dt){
  S.t += dt;
  if(countdown > 0) return;            // カウントダウン中は動かない
  if(S.over) return;
  stepPlayerKinematics(S.p1, hostInputFor(1), dt);
  stepPlayerKinematics(S.p2, hostInputFor(2), dt);
  attackResolve(S.p1, S.p2, dt, S.fx);
  attackResolve(S.p2, S.p1, dt, S.fx);
  S.timer = Math.max(0, S.timer - dt);
  // 勝敗
  if(S.p1.hp <= 0 && S.p2.hp <= 0) S.over = 3;       // 相打ち
  else if(S.p1.hp <= 0) S.over = 2;
  else if(S.p2.hp <= 0) S.over = 1;
  else if(S.timer <= 0) S.over = S.p1.hp === S.p2.hp ? 3 : (S.p1.hp > S.p2.hp ? 1 : 2);
  if(S.over){ phase = 'result'; sfxBell(); }
}
function hostInputFor(side){
  // ホスト=P1が自分、ゲスト側入力=P2（リモート）
  return side === 1 ? localInput() : net.remoteInput;
}
function broadcastState(force){
  if(!S) return;
  const enc = p => [Math.round(p.x), Math.round(p.y), Math.round(p.vx), Math.round(p.hp),
                    p.facing, +(p.biteT.toFixed(2)), +(p.jaw.toFixed(2)), +(p.inv.toFixed(2)),
                    +(p.hitFlash.toFixed(2)), Math.round(p.tread)];
  send({ t:'s', s:{ a:enc(S.p1), b:enc(S.p2), tm:+S.timer.toFixed(1), ov:S.over, cd:+countdown.toFixed(2),
                    fx: S.fx.filter(f=>f.t<0.05).map(f=>[Math.round(f.x),Math.round(f.y),f.big?1:0]) } });
}
function decodeNet(){
  const s = net.netState; if(!s) return;
  const dec = (arr, pl) => { pl.x=arr[0]; pl.y=arr[1]; pl.vx=arr[2]; pl.hp=arr[3]; pl.facing=arr[4];
    pl.biteT=arr[5]; pl.jaw=arr[6]; pl.inv=arr[7]; pl.hitFlash=arr[8]; pl.tread=arr[9]; };
  if(!S) S = { p1: mkPlayer(0,1), p2: mkPlayer(0,-1), t:0, timer:MATCH_TIME, over:0, fx:[] };
  // ゲスト側：受信値へスムーズ補間
  smoothToward(S.p1, s.a); smoothToward(S.p2, s.b);
  S.timer = s.tm; S.over = s.ov; countdown = s.cd;
  if(s.fx) for(const f of s.fx) S.fx.push({ x:f[0], y:f[1], t:0, big:!!f[2] });
  if(S.over && phase !== 'result'){ phase = 'result'; sfxBell(); }
}
function smoothToward(pl, arr){
  // 位置は補間、状態系は即時反映
  const tx=arr[0], ty=arr[1];
  if(pl._init){ pl.x = lerp(pl.x, tx, 0.4); pl.y = lerp(pl.y, ty, 0.5); }
  else { pl.x = tx; pl.y = ty; pl._init = true; }
  pl.vx=arr[2]; const newHp=arr[3];
  if(newHp < pl.hp) pl.hitFlash = 0.3;
  pl.hp=newHp; pl.facing=arr[4]; pl.biteT=arr[5]; pl.jaw=arr[6]; pl.inv=arr[7];
  if(arr[8] > pl.hitFlash) pl.hitFlash = arr[8];
  pl.tread=arr[9];
}

// ---------- メインループ ----------
function perfNow(){ return performance.now(); }
let last = perfNow(), sendAcc = 0, inpAcc = 0, prevInpStr = '';
function loop(now){
  const raw = Math.min(0.033, (now - last)/1000); last = now;
  if(phase === 'play' || phase === 'result'){
    if(countdown > 0) countdown = Math.max(0, countdown - raw);
    if(net.isHost){
      stepSim(raw);
      sendAcc += raw;
      if(sendAcc >= 1/20){ sendAcc = 0; broadcastState(); }
    }else{
      // ゲスト：入力送信＋受信状態の反映
      decodeNet();
      const ip = localInput();
      const s = (ip.left?1:0)+(ip.right?2:0)+(ip.jump?4:0)+(ip.bite?8:0);
      inpAcc += raw;
      if(s !== +prevInpStr || inpAcc > 0.08){
        prevInpStr = '' + s; inpAcc = 0;
        send({ t:'i', l:ip.left, r:ip.right, j:ip.jump, b:ip.bite });
      }
      // ゲスト側のローカル予測（自分=P2を軽く先行表示）※ホストが正）
    }
    // FXの寿命
    if(S) for(let i=S.fx.length-1;i>=0;i--){ S.fx[i].t += raw; if(S.fx[i].t>0.5) S.fx.splice(i,1); }
  }
  draw();
  requestAnimationFrame(loop);
}

// ---------- 描画 ----------
function draw(){
  cx.clearRect(0,0,W,H);
  // 空
  const sky = cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#7ec8ee'); sky.addColorStop(.7,'#cfeaf7'); sky.addColorStop(1,'#e8f4f8');
  cx.fillStyle = sky; cx.fillRect(0,0,W,H);
  // 遠景ビル
  cx.fillStyle = '#b4c4d4';
  for(let i=0;i<12;i++){ const bx=i*90-20, bh=80+((i*53)%100); cx.fillRect(bx,GROUND-bh-18,64,bh+18); }
  // 地面
  cx.fillStyle = '#a89880'; cx.fillRect(0,GROUND,W,H-GROUND);
  cx.fillStyle = '#8f8068'; cx.fillRect(0,GROUND,W,6);
  // 養生フェンス（アリーナ枠）
  cx.fillStyle = '#4a7cc4';
  cx.fillRect(0,GROUND-46,ARENA_L,46); cx.fillRect(ARENA_R,GROUND-46,W-ARENA_R,46);

  if(phase === 'menu'){ drawMenuBg(); return; }
  if(!S){ return; }

  // プレイヤー（奥→手前）
  drawMachine(S.p1, 1);
  drawMachine(S.p2, 2);
  // ヒットエフェクト
  for(const f of S.fx){
    const a = clamp(1 - f.t/0.5, 0, 1);
    cx.save(); cx.globalAlpha = a;
    cx.strokeStyle = '#fff'; cx.lineWidth = 3;
    const r = (f.big?20:12) + f.t*120;
    cx.beginPath(); cx.arc(f.x, f.y, r, 0, 7); cx.stroke();
    cx.fillStyle = '#ffe14d'; cx.font = 'bold ' + (f.big?26:18) + 'px ' + FONT;
    cx.textAlign='center';
    if(f.t < 0.4) cx.fillText(f.big?'ガツン！':'ゴツ！', f.x, f.y - 16 - f.t*30);
    cx.restore();
  }
  drawHUD();
  if(touchMode && !S.over) drawTouch();

  if(countdown > 0 && !S.over){
    const n = Math.ceil(countdown - 0.2);
    cx.fillStyle = 'rgba(0,0,0,.25)'; cx.fillRect(0,0,W,H);
    cx.textAlign='center'; cx.fillStyle = '#fff'; cx.strokeStyle = PINK_D; cx.lineWidth=8;
    cx.font = 'bold 130px ' + FONT;
    const txt = n > 0 ? n : 'START!';
    if(n <= 0){ cx.font = 'bold 90px ' + FONT; }
    cx.strokeText(txt, W/2, H/2+30); cx.fillText(txt, W/2, H/2+30);
  }
  if(S.over) drawResult();
}

function youSide(){ return net.isHost ? 1 : 2; }

function drawHUD(){
  // P1（左） / P2（右）
  drawHpBar(20, 22, 380, S.p1.hp, false, 'P1' + (youSide()===1?'（あなた）':''), '#ff5db0');
  drawHpBar(W-20-380, 22, 380, S.p2.hp, true, 'P2' + (youSide()===2?'（あなた）':''), '#5db0ff');
  // タイマー
  cx.textAlign='center'; cx.font = 'bold 34px ' + FONT;
  cx.fillStyle = S.timer < 11 ? '#ff5252' : '#fff';
  cx.strokeStyle = 'rgba(0,0,0,.5)'; cx.lineWidth = 5;
  const tt = Math.ceil(S.timer);
  cx.strokeText(tt, W/2, 44); cx.fillText(tt, W/2, 44);
}
function drawHpBar(x, y, w, hp, right, label, col){
  cx.fillStyle = 'rgba(0,0,0,.4)'; roundRect(x,y,w,26,8); cx.fill();
  const r = clamp(hp/100,0,1);
  cx.fillStyle = col;
  if(right){ roundRect(x + w - w*r + 0, y+3, w*r-3, 20, 6); }
  else { roundRect(x+3, y+3, w*r-3, 20, 6); }
  cx.fill();
  cx.fillStyle = '#fff'; cx.font = 'bold 14px ' + FONT;
  cx.textAlign = right ? 'right' : 'left';
  cx.fillText(label + '  ' + Math.ceil(hp), right ? x+w-8 : x+8, y+18);
}

function drawMachine(pl, idx){
  const T = performance.now()/1000;
  const flash = pl.hitFlash > 0 && Math.floor(pl.hitFlash*16)%2===0;
  cx.save();
  cx.translate(pl.x, pl.y);
  // 影
  cx.fillStyle = 'rgba(0,0,0,.18)';
  cx.beginPath(); cx.ellipse(0, GROUND-pl.y+6, 52, 8, 0, 0, 7); cx.fill();
  cx.save();
  if(flash) cx.globalAlpha = 0.5;
  cx.scale(pl.facing, 1);
  cx.rotate(pl.pitch * pl.facing);
  // クローラー
  cx.fillStyle = '#3c3c44'; roundRect(-50,-26,100,26,12); cx.fill();
  cx.fillStyle = '#55555e';
  for(let i=0;i<4;i++){ cx.beginPath(); cx.arc(-34+i*23,-13,6,0,7); cx.fill(); }
  cx.fillStyle = '#1e1e26';
  const to = ((pl.tread%15)+15)%15;
  for(let i=-4;i<4;i++){ const tx=i*15+to; if(tx>-46&&tx<42){ cx.fillRect(tx,-4,6,4); cx.fillRect(tx,-26,6,3);} }
  // 旋回体（ピンク水玉）
  const bw=92,bh=36,bx=-58,by=-62;
  cx.save();
  roundRect(bx,by,bw,bh,8); cx.fillStyle = PINK; cx.fill(); cx.clip();
  dots(bx,by,bw,bh,6); heart(bx+14,by+bh-12,8,PINK_D);
  cx.restore();
  cx.strokeStyle = PINK_D; cx.lineWidth=2; roundRect(bx,by,bw,bh,8); cx.stroke();
  // キャブ
  const cbx=6,cby=-100,cw=34,ch=42;
  roundRect(cbx,cby,cw,ch,6); cx.fillStyle='#2e2e38'; cx.fill();
  cx.strokeStyle='#1c1c24'; cx.lineWidth=2; cx.stroke();
  cx.fillStyle='#9fd3e8'; roundRect(cbx+4,cby+4,cw-8,ch*0.5,4); cx.fill();
  // プレイヤー番号フラッグ
  const fcol = idx===1 ? '#ff3b3b' : '#3b8bff';
  cx.fillStyle = fcol; cx.fillRect(bx+bw-10,by-22,4,22);
  cx.beginPath(); cx.moveTo(bx+bw-6,by-22); cx.lineTo(bx+bw+14,by-17); cx.lineTo(bx+bw-6,by-12); cx.fill();
  cx.fillStyle='#fff'; cx.font='bold 9px '+FONT; cx.textAlign='center';
  cx.fillText('P'+idx, bx+bw+2, by-15);
  // アーム＋圧砕機（前方へ）
  const sx=20, sy=-58, l1=46, l2=40;
  const a1=-0.32, e1x=sx+Math.cos(a1)*l1, e1y=sy+Math.sin(a1)*l1;
  const a2=0.30, tx=e1x+Math.cos(a2)*l2, ty=e1y+Math.sin(a2)*l2;
  limb(sx,sy,e1x,e1y,12); limb(e1x,e1y,tx,ty,9);
  cx.fillStyle=PINK_D; cx.beginPath(); cx.arc(sx,sy,7,0,7); cx.fill();
  cx.beginPath(); cx.arc(e1x,e1y,5,0,7); cx.fill();
  drawCrusher(tx,ty,a2,pl.jaw);
  cx.restore();
  // 「あなた」表示
  if((idx===youSide())){
    cx.fillStyle = '#ffe14d'; cx.font='bold 13px '+FONT; cx.textAlign='center';
    const yy = -118 + Math.sin(T*4+idx)*3;
    cx.strokeStyle='rgba(0,0,0,.5)'; cx.lineWidth=3;
    cx.strokeText('▼あなた', 0, yy); cx.fillText('▼あなた', 0, yy);
  }
  cx.restore();
}
function limb(x1,y1,x2,y2,w){
  cx.strokeStyle=PINK_D; cx.lineWidth=w+4; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.stroke();
  cx.strokeStyle=PINK; cx.lineWidth=w;
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.stroke();
  // ドット
  cx.fillStyle='#fff';
  const n=Math.floor(Math.hypot(x2-x1,y2-y1)/14);
  for(let i=1;i<n;i++){ const t=i/n; cx.beginPath(); cx.arc(x1+(x2-x1)*t,y1+(y2-y1)*t,2.6,0,7); cx.fill(); }
}
function drawCrusher(x,y,a,jaw){
  cx.save(); cx.translate(x,y); cx.rotate(a);
  cx.fillStyle='#4a4a54'; roundRect(-9,-12,24,24,6); cx.fill();
  cx.strokeStyle='#2c2c34'; cx.lineWidth=2; roundRect(-9,-12,24,24,6); cx.stroke();
  cx.save(); cx.translate(7,0); cx.rotate(-jaw); jaw1(1); cx.restore();
  cx.save(); cx.translate(7,0); cx.rotate(jaw*0.85); jaw1(-1); cx.restore();
  cx.fillStyle='#3a3a42'; cx.beginPath(); cx.arc(7,0,5,0,7); cx.fill();
  cx.fillStyle=PINK; cx.beginPath(); cx.arc(2,0,6,0,7); cx.fill();
  cx.fillStyle='#fff'; cx.beginPath(); cx.arc(2,0,2.6,0,7); cx.fill();
  cx.restore();
}
function jaw1(side){
  cx.fillStyle='#5a5a64'; cx.beginPath();
  cx.moveTo(-2,-4*side); cx.quadraticCurveTo(22,-18*side,44,-8*side);
  cx.quadraticCurveTo(47,-4*side,44,-1*side);
  cx.lineTo(36,-8*side); cx.lineTo(31,-2*side); cx.lineTo(23,-8*side);
  cx.lineTo(18,-2*side); cx.lineTo(8,-6*side); cx.closePath(); cx.fill();
  cx.strokeStyle='#33333a'; cx.lineWidth=2; cx.stroke();
}
function dots(x,y,w,h,r){
  cx.fillStyle='#fff'; const gap=r*3.1; let k=0,idx=0;
  for(let yy=y+r*1.2;yy<y+h-r*0.3;yy+=gap){ const off=(k%2)*gap/2;
    for(let xx=x+r*1.2+off;xx<x+w-r*0.3;xx+=gap){ if(idx%4===3) heart(xx,yy,r*1.05,'#fff');
      else { cx.beginPath(); cx.arc(xx,yy,r,0,7); cx.fill(); } idx++; } k++; }
}
function heart(x,y,s,col){ cx.fillStyle=col; cx.beginPath();
  cx.moveTo(x,y+s*0.6); cx.bezierCurveTo(x-s,y-s*0.4,x-s*0.5,y-s,x,y-s*0.3);
  cx.bezierCurveTo(x+s*0.5,y-s,x+s,y-s*0.4,x,y+s*0.6); cx.fill(); }
function roundRect(x,y,w,h,r){ cx.beginPath(); cx.moveTo(x+r,y);
  cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }

function drawTouch(){
  cx.textBaseline='middle';
  for(const k in TB){ const b=TB[k];
    cx.globalAlpha=0.45; cx.fillStyle='#10101c'; cx.beginPath(); cx.arc(b.x,b.y,b.r,0,7); cx.fill();
    cx.strokeStyle = k==='bite'?'#ffe14d':'#fff'; cx.lineWidth=3; cx.beginPath(); cx.arc(b.x,b.y,b.r,0,7); cx.stroke();
    cx.fillStyle='#fff'; cx.font='bold '+Math.round(b.r*0.8)+'px '+FONT; cx.textAlign='center';
    cx.fillText(b.label,b.x,b.y+2); cx.globalAlpha=1; }
  cx.textBaseline='alphabetic';
}

function drawResult(){
  cx.fillStyle='rgba(20,12,28,.62)'; cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  let main, col;
  if(S.over === 3){ main='引き分け！'; col='#ffe14d'; }
  else { const youWin = S.over === youSide(); main = youWin ? '🏆 あなたの勝ち！' : '😵 あなたの負け…';
         col = youWin ? '#ffe14d' : '#ff8fc6'; }
  for(let i=0;i<16;i++){ const a=performance.now()/600+i; heart(W/2+Math.cos(a)*(150+(i%4)*60),H/2-20+Math.sin(a*1.3)*(90+(i%3)*40),7,i%2?PINK_L:PINK); }
  cx.fillStyle=col; cx.font='bold 50px '+FONT;
  cx.strokeStyle='rgba(0,0,0,.5)'; cx.lineWidth=7;
  cx.strokeText(main,W/2,H/2-30); cx.fillText(main,W/2,H/2-30);
  cx.fillStyle='#fff'; cx.font='bold 22px '+FONT;
  cx.fillText('P1 ' + Math.ceil(S.p1.hp) + '　-　' + Math.ceil(S.p2.hp) + ' P2', W/2, H/2+18);
  cx.font='18px '+FONT;
  if(net.isHost){ if(Math.floor(performance.now()/500)%2===0) cx.fillText(touchMode?'画面タップでもう一戦':'R キーでもう一戦', W/2, H/2+60); }
  else cx.fillText('ホストの再戦を待っています…', W/2, H/2+60);
}

function drawMenuBg(){
  // ロビー背景に重機をちらり
  const demo = { x:W/2, y:GROUND, vx:0, facing:1, tread:performance.now()*0.05, pitch:0, jaw:0.2+Math.sin(performance.now()/400)*0.1, t:performance.now()/1000, inv:0, hitFlash:0 };
  drawMachine(demo, 1);
}

// ---------- ロビーUI配線 ----------
const lobby = document.getElementById('lobby');
const menu = document.getElementById('menu');
const hostBox = document.getElementById('hostBox');
const joinBox = document.getElementById('joinBox');
const codeShow = document.getElementById('codeShow');
const hostMsg = document.getElementById('hostMsg');
const joinMsg = document.getElementById('joinMsg');
const joincode = document.getElementById('joincode');
function showBox(which){
  menu.style.display = which==='menu' ? 'flex':'none';
  hostBox.style.display = which==='hostBox' ? 'block':'none';
  joinBox.style.display = which==='joinBox' ? 'block':'none';
}
document.getElementById('bHost').onclick = () => { ensurePeerJS(()=>startHost()); };
document.getElementById('bJoin').onclick = () => startJoin();
document.getElementById('bConnect').onclick = () => ensurePeerJS(()=>doConnect());
document.getElementById('bHostCancel').onclick = () => peerLost('');
document.getElementById('bJoinCancel').onclick = () => { showBox('menu'); };
joincode.addEventListener('input', () => { joincode.value = joincode.value.toUpperCase().replace(/[^A-Z0-9]/g,''); });
function ensurePeerJS(cb){
  if(typeof Peer === 'undefined'){
    hostMsg.textContent = joinMsg.textContent = '通信ライブラリを読み込めません（ネット接続を確認）';
    return;
  }
  cb();
}

requestAnimationFrame(loop);
</script>
